<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- iOS Specific Metas -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mi Súper">
    <meta name="theme-color" content="#4f46e5">

    <title>Mi Super AI iOS</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-enter { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .mic-active { animation: pulse 1.5s infinite; background-color: #ef4444 !important; border-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>
    <div id="root" class="h-screen w-full flex justify-center items-start sm:items-center sm:p-4 bg-gray-100"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONOS ---
        const Icon = ({ name, size = 18, className = "" }) => {
            const i = {
                Plus: <path d="M12 5v14M5 12h14" />,
                ShoppingBag: <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z M3 6h18 M16 10a4 4 0 0 1-8 0" />,
                Home: <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10" />,
                History: <path d="M12 8v4l3 3 M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5" />,
                Check: <polyline points="20 6 9 17 4 12" />,
                Trash: <path d="M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6 M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />,
                Mic: <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z M19 10v2a7 7 0 0 1-14 0v-2 M12 19v4 M8 23h8" />,
                Settings: <><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></>,
                Sparkles: <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />,
                Chef: <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z M6 17h12" />,
                X: <><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>,
                ArrowRight: <><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></>,
                Tag: <><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" /><line x1="7" y1="7" x2="7.01" y2="7" /></>,
                Clock: <><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></>,
                Upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12" />,
                Download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M7 10l5 5 5-5 M12 15V3" />,
                Stop: <rect x="6" y="6" width="12" height="12" />
            };
            return <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{i[name]}</svg>;
        };

        const SuperApp = () => {
            const [key, setKey] = useState(()=>localStorage.getItem('gem_key')||'');
            const [tab, setTab] = useState('shop'); 
            const [items, setItems] = useState(() => JSON.parse(localStorage.getItem('data_v2')) || []);
            const [savedTags, setSavedTags] = useState(() => JSON.parse(localStorage.getItem('saved_tags')) || ['General', 'Costco', 'Super', 'Mercado', 'Oxxo']);
            const [name, setName] = useState('');
            const [tagInput, setTagInput] = useState('');
            const [selTags, setSelTags] = useState(['General']);
            const [filter, setFilter] = useState('Todos');
            const [loading, setLoading] = useState(false);
            const [modal, setModal] = useState(null); 
            const [prompt, setPrompt] = useState('');
            const [result, setResult] = useState(null);
            const [isListening, setIsListening] = useState(false);
            const recognitionRef = useRef(null);
            
            useEffect(()=>localStorage.setItem('data_v2', JSON.stringify(items)),[items]);
            useEffect(()=>localStorage.setItem('saved_tags', JSON.stringify(savedTags)),[savedTags]);
            useEffect(()=>localStorage.setItem('gem_key', key),[key]);

            // --- IMPORT / EXPORT CSV ---
            const handleExportCSV = () => {
                const headers = ["ID,Nombre,Lugares,Estado,UltimaCompra,Cantidad,Caducidad"];
                const rows = items.map(i => 
                    `${i.id},"${i.name.replace(/"/g, '""')}","${i.places.join('|')}","${i.status}","${i.lastBought||''}","${i.qty||''}","${i.expiry||''}"`
                );
                const csvContent = "data:text/csv;charset=utf-8," + [headers, ...rows].join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `misuper_backup_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleImportCSV = (e) => {
                const f = e.target.files[0];
                if(!f) return;
                const r = new FileReader();
                r.onload = (evt) => {
                    const l = evt.target.result.split('\n');
                    const n = l.slice(1).map(line => {
                        if (!line.trim()) return null;
                        const c = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || line.split(',');
                        if(!c[0]) return null;
                        const clean = (val) => val ? val.replace(/^"|"$/g, '').replace(/""/g, '"') : '';
                        return {
                            id: Date.now() + Math.random(),
                            name: clean(c[1]) || 'Item Importado',
                            places: c[2] ? clean(c[2]).split('|') : ['General'],
                            status: 'stocked',
                            lastBought: clean(c[4]) || null,
                            qty: clean(c[5]) || '',
                            expiry: clean(c[6]) || ''
                        };
                    }).filter(Boolean);
                    if(n.length && confirm(`¿Importar ${n.length} productos a tu inventario?`)) {
                        setItems(prev => [...prev, ...n]);
                        const newTags = new Set(savedTags);
                        n.forEach(i => i.places.forEach(t => newTags.add(t)));
                        setSavedTags([...newTags]);
                    }
                };
                r.readAsText(f);
                e.target.value = '';
            };

            // --- DICTADO MEJORADO ---
            const toggleListening = () => {
                if (isListening) {
                    // Si ya está escuchando, lo detenemos manual
                    if (recognitionRef.current) recognitionRef.current.stop();
                    setIsListening(false);
                    return;
                }

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    alert("Tu navegador no soporta dictado directo. Usa el teclado.");
                    return;
                }
                
                const recognition = new SpeechRecognition();
                recognition.lang = 'es-MX';
                recognition.continuous = true; // CAMBIO: Ahora es continuo
                recognition.interimResults = true; // Para ver lo que dices mientras hablas
                
                recognition.onstart = () => setIsListening(true);
                recognition.onend = () => setIsListening(false);
                recognition.onerror = (e) => { 
                    console.error(e); 
                    setIsListening(false); 
                    // Ignorar errores 'no-speech' si es continuo, pero alertar otros
                    if (e.error !== 'no-speech') alert("Error: " + e.error); 
                };
                
                recognition.onresult = (event) => {
                    let finalTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript + ' ';
                        }
                    }
                    if (finalTranscript) {
                        setPrompt(prev => (prev + ' ' + finalTranscript).trim());
                    }
                };

                recognitionRef.current = recognition;
                recognition.start();
            };

            const cleanJSON = (text) => {
                const start = text.indexOf('[');
                const end = text.lastIndexOf(']');
                if (start !== -1 && end !== -1) return text.substring(start, end + 1);
                return text;
            };

            const callAI = async (textPrompt) => {
                if(!key) { setResult("⚠️ Configura tu API Key en el engrane."); return; }
                setLoading(true); setResult(null);
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: textPrompt }] }] })
                    });
                    const data = await res.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                } catch(e) { setResult("Error de conexión."); return null; } finally { setLoading(false); }
            };

            const handleDictation = async () => {
                if(!prompt.trim()) return;
                const p = `Analiza: "${prompt}". Extrae productos. 
                Devuelve JSON ARRAY: [{"name":"x","places":["y"],"status":"needed|stocked","qty":"2 litros","expiry":"2024-12-01"}]. 
                Si dice "tengo"->"stocked", "falta"->"needed". 
                Si menciona fecha (vence mañana), calcula YYYY-MM-DD.
                Si no menciona lugar, usa "General". SOLO JSON.`;
                const raw = await callAI(p);
                if(raw) {
                    try {
                        const json = JSON.parse(cleanJSON(raw));
                        const newItems = json.map(i => ({
                            id: Date.now()+Math.random(), name: i.name, places: i.places||['General'], 
                            status: i.status||'needed', lastBought: i.status==='stocked'?'Hoy':null,
                            qty: i.qty || '', expiry: i.expiry || ''
                        }));
                        setItems(prev => [...prev, ...newItems]);
                        const newTags = new Set(savedTags);
                        newItems.forEach(i => i.places.forEach(t => newTags.add(t)));
                        setSavedTags([...newTags]);
                        setResult(`✅ Procesado: ${newItems.length} items.`);
                        setPrompt(''); 
                    } catch(e) { setResult("La IA respondió algo raro. Intenta de nuevo."); }
                }
            };

            const handleChef = async () => {
                const stock = items.filter(i=>i.status==='stocked').map(i=>`${i.name} (${i.qty||''}) ${i.expiry?`vence:${i.expiry}`:''}`).join(', ');
                if(!stock) { setResult("No hay comida en casa :("); return; }
                const raw = await callAI(`Soy chef. Tengo: ${stock}. Crea receta usando lo que vence pronto. Respuesta limpia sin markdown excesivo.`);
                setResult(raw);
            };

            const addItem = (e, st='needed') => {
                if(e) e.preventDefault(); if(!name.trim()) return;
                setItems([...items, { id: Date.now(), name, places: selTags, status: st, lastBought: st==='stocked'?'Hoy':null, qty:'', expiry:'' }]);
                setName(''); setSelTags(['General']);
            };

            const addTag = () => {
                if(tagInput && !savedTags.includes(tagInput)){
                    setSavedTags([...savedTags, tagInput]);
                    setSelTags([...selTags, tagInput]);
                    setTagInput('');
                } else if (tagInput) {
                    if(!selTags.includes(tagInput)) setSelTags([...selTags, tagInput]);
                    setTagInput('');
                }
            };

            const toggleTag = (t) => {
                if(selTags.includes(t)) { if(selTags.length>1) setSelTags(selTags.filter(x=>x!==t)); } else setSelTags([...selTags, t]);
            };

            const filtered = items.filter(i => {
                if(tab==='shop') return (i.status==='needed'||i.status==='cart') && (filter==='Todos'||i.places.includes(filter)||i.places.includes('General'));
                if(tab==='inv') return i.status==='stocked';
                return true;
            });

            return (
                <div className="w-full h-full sm:h-[90vh] sm:max-w-[420px] bg-white sm:rounded-[30px] shadow-2xl flex flex-col relative overflow-hidden text-gray-800">
                    <div className="bg-indigo-600 p-5 pt-safe-top text-white rounded-b-[24px] shadow-lg shrink-0 z-10 safe-top">
                        <div className="flex justify-between items-center mb-4 mt-2">
                            <h1 className="text-xl font-bold flex items-center gap-2"><Icon name="ShoppingBag"/> Mi Súper</h1>
                            <div className="flex gap-2">
                                <button onClick={()=>{setModal('dictate'); setResult(null); setPrompt('')}} className="p-2 bg-white/20 rounded-full hover:bg-white/30"><Icon name="Mic"/></button>
                                <button onClick={()=>{setModal('settings'); setResult(null)}} className="p-2 bg-white/20 rounded-full hover:bg-white/30"><Icon name="Settings"/></button>
                            </div>
                        </div>
                        <div className="bg-white/10 backdrop-blur p-2 rounded-xl border border-white/20">
                            <div className="flex gap-2 mb-2">
                                <input value={name} onChange={e=>setName(e.target.value)} placeholder={tab==='inv'?"Agregar a Casa...":"¿Qué falta?"} className="bg-transparent w-full text-white placeholder-indigo-200 outline-none font-medium"/>
                                <button onClick={e=>addItem(e, tab==='inv'?'stocked':'needed')} disabled={!name} className="bg-white text-indigo-600 p-2 rounded-lg"><Icon name="Plus"/></button>
                            </div>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                <div className="flex items-center gap-1 bg-white/20 px-2 py-1 rounded-lg shrink-0">
                                    <Icon name="Plus" size={10}/><input value={tagInput} onChange={e=>setTagInput(e.target.value)} onBlur={addTag} onKeyDown={e=>e.key==='Enter'&&addTag()} placeholder="Etiqueta" className="bg-transparent w-14 text-xs text-white outline-none placeholder-indigo-300"/>
                                </div>
                                {savedTags.map(t => (
                                    <button key={t} onClick={()=>toggleTag(t)} className={`px-2 py-1 rounded-lg text-[10px] font-bold whitespace-nowrap transition ${selTags.includes(t)?'bg-white text-indigo-700 shadow':'bg-indigo-800/50 text-indigo-200 border border-indigo-500/30'}`}>{t} {selTags.includes(t)&&'✓'}</button>
                                ))}
                            </div>
                        </div>
                    </div>
                    <div className="flex border-b border-gray-100 shrink-0">
                        {[{id:'shop',icon:'ShoppingBag',l:'Lista'},{id:'inv',icon:'Home',l:'Casa'},{id:'hist',icon:'History',l:'Historial'}].map(x=>(
                            <button key={x.id} onClick={()=>setTab(x.id)} className={`flex-1 py-3 flex flex-col items-center gap-1 text-[10px] font-bold ${tab===x.id?'text-indigo-600 bg-indigo-50':'text-gray-400'}`}>
                                <Icon name={x.icon} size={20} className={tab===x.id?'stroke-[2.5]':'stroke-2'}/> {x.l}
                            </button>
                        ))}
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50 pb-safe-bottom safe-bottom">
                        {tab==='shop' && (
                            <>
                                <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                    <button onClick={()=>setFilter('Todos')} className={`px-3 py-1 rounded-full text-xs font-bold border ${filter==='Todos'?'bg-gray-800 text-white':'bg-white text-gray-500'}`}>Todos</button>
                                    {savedTags.filter(x=>x!=='General').map(t=>(<button key={t} onClick={()=>setFilter(t)} className={`px-3 py-1 rounded-full text-xs font-bold border whitespace-nowrap ${filter===t?'bg-gray-800 text-white':'bg-white text-gray-500'}`}>{t}</button>))}
                                </div>
                                {!filtered.length && <div className="text-center py-10 text-gray-400 text-sm">Nada por aquí 🦗</div>}
                                {filtered.map(i => (
                                    <div key={i.id} onClick={()=>{const ns = i.status==='needed'?'cart':'needed'; setItems(items.map(x=>x.id===i.id?{...x,status:ns}:x));}} className={`p-3 rounded-xl border flex items-center justify-between shadow-sm cursor-pointer transition animate-enter ${i.status==='cart'?'bg-green-50 border-green-200 opacity-60':'bg-white border-gray-100'}`}>
                                        <div className="flex items-center gap-3 overflow-hidden">
                                            <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${i.status==='cart'?'bg-green-500 border-green-500':'border-gray-300'}`}>{i.status==='cart'&&<Icon name="Check" size={12} className="text-white"/>}</div>
                                            <div><p className={`font-semibold text-sm ${i.status==='cart'&&'line-through'}`}>{i.name}</p><p className="text-[10px] text-gray-500">{i.places.join(', ')} {i.qty && `• ${i.qty}`}</p></div>
                                        </div>
                                    </div>
                                ))}
                            </>
                        )}
                        {tab==='inv' && (
                            <>
                                <div className="grid grid-cols-2 gap-2 mb-2 animate-enter">
                                    <button onClick={handleExportCSV} className="bg-indigo-50 text-indigo-700 border border-indigo-100 p-2 rounded-xl flex items-center justify-center gap-1 text-xs font-bold active:scale-95 transition"><Icon name="Download" size={14}/> Exportar</button>
                                    <div className="bg-white text-gray-600 border border-gray-200 p-2 rounded-xl flex items-center justify-center gap-1 text-xs font-bold relative overflow-hidden active:scale-95 transition">
                                        <Icon name="Upload" size={14}/> Importar CSV
                                        <input type="file" accept=".csv" onChange={handleImportCSV} className="absolute inset-0 opacity-0 cursor-pointer" />
                                    </div>
                                </div>
                                <div className="bg-green-100 p-3 rounded-xl border border-green-200 flex justify-between items-center text-green-800 text-xs font-bold mb-2">
                                    <span>🏠 En Casa: {filtered.length}</span>
                                    <button onClick={()=>{setModal('chef'); setResult(null); handleChef()}} className="bg-white px-2 py-1 rounded shadow-sm flex items-center gap-1"><Icon name="Chef" size={14}/> Chef</button>
                                </div>
                                {filtered.map(i => (
                                    <div key={i.id} className="p-3 bg-white rounded-xl border border-gray-100 shadow-sm animate-enter">
                                        <div className="flex justify-between items-start mb-2">
                                            <div><p className="font-semibold text-gray-800">{i.name}</p><div className="flex gap-1 mt-1">{i.places.map(p=><span key={p} className="text-[9px] bg-gray-100 px-1 rounded">{p}</span>)}</div></div>
                                            <div className="flex gap-1">
                                                <button onClick={()=>setItems(items.map(x=>x.id===i.id?{...x,status:'needed'}:x))} className="p-1.5 bg-indigo-50 text-indigo-600 rounded-lg"><Icon name="Plus"/></button>
                                                <button onClick={()=>{if(confirm('¿Borrar?'))setItems(items.filter(x=>x.id!==i.id))}} className="p-1.5 bg-red-50 text-red-400 rounded-lg"><Icon name="Trash"/></button>
                                            </div>
                                        </div>
                                        <div className="flex gap-2 mt-2 pt-2 border-t border-gray-50">
                                            <input placeholder="Cant. (1kg)" value={i.qty} onChange={e=>setItems(items.map(x=>x.id===i.id?{...x,qty:e.target.value}:x))} className="bg-gray-50 w-20 text-[10px] p-1 rounded border-none"/>
                                            <div className="flex items-center gap-1 bg-gray-50 rounded px-1">
                                                <Icon name="Clock" size={10} className="text-gray-400"/>
                                                <input type="date" value={i.expiry} onChange={e=>setItems(items.map(x=>x.id===i.id?{...x,expiry:e.target.value}:x))} className="bg-transparent text-[10px] p-1 border-none outline-none"/>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </>
                        )}
                        {tab==='hist' && (
                             <div className="bg-white rounded-xl border border-gray-100 divide-y divide-gray-50">
                                {items.sort((a,b)=>(b.lastBought||'').localeCompare(a.lastBought||'')).map(i=>(
                                    <div key={i.id} className="p-3 flex justify-between items-center"><span className="text-sm">{i.name}</span><span className="text-[10px] bg-gray-100 px-2 py-1 rounded">{i.lastBought||'-'}</span></div>
                                ))}
                             </div>
                        )}
                    </div>
                    {tab==='shop' && items.some(i=>i.status==='cart') && (
                        <div className="absolute bottom-4 left-4 right-4 animate-enter pb-safe-bottom">
                            <button onClick={()=>{if(confirm("¿Mover comprados a Casa?")){setItems(items.map(i=>i.status==='cart'?{...i,status:'stocked',lastBought:'Hoy'}:i)); setTab('inv');}}} className="w-full bg-gray-900 text-white p-4 rounded-xl shadow-xl flex justify-between items-center">
                                <span className="font-bold text-sm ml-2">Finalizar Compra ({items.filter(i=>i.status==='cart').length})</span>
                                <div className="bg-white/20 p-1 rounded-full mr-2"><Icon name="ArrowRight"/></div>
                            </button>
                        </div>
                    )}
                    {modal && (
                        <div className="absolute inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-4">
                            <div className="bg-white w-full rounded-2xl p-5 shadow-2xl animate-enter max-h-[80%] overflow-auto">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-lg flex gap-2 items-center">{modal==='settings'?<><Icon name="Settings"/> Configuración</>:<><Icon name="Sparkles"/> IA</>}</h3>
                                    <button onClick={()=>{setModal(null); setPrompt(''); setResult(null)}} className="bg-gray-100 p-1 rounded-full"><Icon name="X"/></button>
                                </div>
                                {modal === 'settings' ? (
                                    <div className="space-y-4">
                                        <p className="text-xs text-gray-500">Pega tu API Key de Google AI Studio (Gratis):</p>
                                        <input value={key} onChange={e=>setKey(e.target.value)} placeholder="AIza..." className="w-full border p-2 rounded font-mono text-xs"/>
                                        <button onClick={()=>setModal(null)} className="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold">Guardar</button>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {modal==='dictate' && (
                                            <>
                                                <p className="text-xs text-gray-500">Dicta: "Tengo 2 litros de leche que vencen mañana..."</p>
                                                <textarea value={prompt} onChange={e=>setPrompt(e.target.value)} className="w-full border p-2 rounded-lg text-sm" rows="3" placeholder="Escribe o dicta..."/>
                                                <div className="flex gap-2">
                                                    <button onClick={toggleListening} className={`flex-1 py-3 rounded-lg font-bold text-white flex justify-center items-center gap-2 transition-colors ${isListening ? 'mic-active' : 'bg-red-500'}`}>
                                                        {isListening ? <><Icon name="Stop"/> Parar</> : <><Icon name="Mic"/> Hablar</>}
                                                    </button>
                                                    <button onClick={handleDictation} disabled={loading} className="flex-1 bg-indigo-600 text-white py-3 rounded-lg font-bold flex justify-center items-center gap-2">{loading ? 'Pensando...' : <><Icon name="Sparkles"/> Procesar</>}</button>
                                                </div>
                                            </>
                                        )}
                                        {modal==='chef' && (<div className="text-center">{loading && <p className="text-indigo-600 animate-pulse">Cocinando idea...</p>}{!loading && !result && <p className="text-red-500">Error al contactar al Chef.</p>}</div>)}
                                        {result && (
                                            <div className="bg-indigo-50 p-3 rounded-xl border border-indigo-100 text-sm mt-2">
                                                <div className="prose prose-sm max-w-none whitespace-pre-wrap">{result}</div>
                                                <div className="flex gap-2 mt-3">
                                                    <button onClick={()=>{setResult(null); setPrompt('')}} className="flex-1 bg-white border border-gray-200 py-2 rounded text-xs font-bold text-gray-600">Limpiar</button>
                                                    {modal==='chef' && <button onClick={()=>setModal(null)} className="flex-1 bg-indigo-600 text-white py-2 rounded text-xs font-bold">¡A Cocinar!</button>}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SuperApp />);
    </script>
</body>
</html>
