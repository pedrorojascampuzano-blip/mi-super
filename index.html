<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mi Súper">
    <meta name="theme-color" content="#4f46e5">

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="icon.svg">

    <title>Mi Súper</title>
    
    <script src="config.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        .ios-header { padding-top: max(20px, env(safe-area-inset-top)); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-enter { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .mic-active { animation: pulse 1.5s infinite; background-color: #ef4444 !important; border-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        input, textarea, select { font-size: 16px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .toast-enter { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body>
    <div id="root" class="h-screen w-full flex justify-center items-start sm:items-center sm:p-4 bg-gray-100"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            const i = {
                Plus: <path d="M12 5v14M5 12h14" />,
                ShoppingBag: <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z M3 6h18 M16 10a4 4 0 0 1-8 0" />,
                Home: <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10" />,
                History: <path d="M12 8v4l3 3 M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5" />,
                Check: <polyline points="20 6 9 17 4 12" />,
                Trash: <path d="M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6 M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />,
                Mic: <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z M19 10v2a7 7 0 0 1-14 0v-2 M12 19v4 M8 23h8" />,
                Settings: <><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></>,
                Sparkles: <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />,
                Chef: <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z M6 17h12" />,
                X: <><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>,
                ArrowRight: <><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></>,
                Tag: <><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" /><line x1="7" y1="7" x2="7.01" y2="7" /></>,
                Clock: <><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></>,
                Upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12" />,
                Download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M7 10l5 5 5-5 M12 15V3" />,
                Stop: <rect x="6" y="6" width="12" height="12" />,
                Camera: <><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></>,
                Edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></>,
                Star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />,
                Archive: <><polyline points="21 8 21 21 3 21 3 8" /><rect x="1" y="3" width="22" height="5" /><line x1="10" y1="12" x2="14" y2="12" /></>
            };
            return <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{i[name]}</svg>;
        };

        const SuperApp = () => {
            const [key, setKey] = useState(()=>localStorage.getItem('gem_key')||'');
            const [dsKey, setDsKey] = useState(()=>localStorage.getItem('ds_key')||'');
            const [claudeKey, setClaudeKey] = useState(()=>localStorage.getItem('cl_key')||'');
            const [openaiKey, setOpenaiKey] = useState(()=>localStorage.getItem('oa_key')||'');
            const [tab, setTab] = useState('shop'); 
            const [items, setItems] = useState(() => { try { return JSON.parse(localStorage.getItem('data_v4')) || []; } catch { return []; } });
            const [savedTags, setSavedTags] = useState(() => { try { return JSON.parse(localStorage.getItem('saved_tags')) || ['General', 'Costco', 'Super', 'Mercado', 'Oxxo']; } catch { return ['General', 'Costco', 'Super', 'Mercado', 'Oxxo']; } });
            const [name, setName] = useState('');
            const [tagInput, setTagInput] = useState('');
            const [selTags, setSelTags] = useState(['General']);
            const [filter, setFilter] = useState('Todos'); 
            const [invFilter, setInvFilter] = useState('Todos'); 
            const [modal, setModal] = useState(null); 
            const [prompt, setPrompt] = useState('');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const [editItem, setEditItem] = useState(null);
            const [confirmData, setConfirmData] = useState({ isOpen: false, msg: '', action: null, altAction: null, altText: '' });
            const recognitionRef = useRef(null);

            const categories = ['Alimentos', 'Medicamentos', 'Limpieza', 'Hogar', 'Mascotas', 'Otros'];

            const newId = () => (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : (Date.now() + '_' + Math.random().toString(36).slice(2));
            const todayISO = () => new Date().toISOString().slice(0, 10);
            const [undoSnapshot, setUndoSnapshot] = useState(null);
            const undoTimerRef = useRef(null);
            const [onboarded, setOnboarded] = useState(() => localStorage.getItem('onboarded_v1') === '1');
            const [updateReady, setUpdateReady] = useState(false);

            useEffect(() => {
                const onUpdate = () => setUpdateReady(true);
                window.addEventListener('sw-update-available', onUpdate);
                return () => window.removeEventListener('sw-update-available', onUpdate);
            }, []);

            const applyUpdate = () => {
                const w = window.__swWaiting;
                if (w) w.postMessage({ type: 'SKIP_WAITING' });
                else window.location.reload();
            };
            const [obStep, setObStep] = useState('welcome');
            const [obName, setObName] = useState('');
            const [obNick, setObNick] = useState('');
            const [obCode, setObCode] = useState('');
            const [obError, setObError] = useState(null);
            const [obLoading, setObLoading] = useState(false);
            const [obShareCode, setObShareCode] = useState(null);
            const [obShareName, setObShareName] = useState(null);

            // ─── Cloud sync state ───
            const cloudConfigured = !!(window.SUPABASE_URL && window.SUPABASE_ANON_KEY && window.supabase);
            const [groupId, setGroupId] = useState(() => localStorage.getItem('cloud_group_id') || null);
            const [groupCode, setGroupCode] = useState(() => localStorage.getItem('cloud_group_code') || null);
            const [groupName, setGroupName] = useState(() => localStorage.getItem('cloud_group_name') || null);
            const [nickname, setNickname] = useState(() => localStorage.getItem('cloud_nickname') || '');
            const [members, setMembers] = useState([]);
            const [syncStatus, setSyncStatus] = useState('offline'); // 'offline' | 'connecting' | 'online' | 'error'
            const cloudMode = cloudConfigured && !!groupId;
            const sbRef = useRef(null);
            const lastSyncedRef = useRef(items);
            const remoteApplyRef = useRef(false);
            const channelRef = useRef(null);

            useEffect(() => {
                if (cloudConfigured && !sbRef.current) {
                    sbRef.current = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, { auth: { persistSession: true, autoRefreshToken: true } });
                }
                if (sbRef.current) {
                    sbRef.current.auth.getSession().then(({ data }) => {
                        if (!data.session) sbRef.current.auth.signInAnonymously();
                    });
                }
            }, []);

            useEffect(() => { localStorage.setItem('data_v4', JSON.stringify(items)); }, [items]);
            useEffect(() => { localStorage.setItem('saved_tags', JSON.stringify(savedTags)); }, [savedTags]);
            useEffect(() => { localStorage.setItem('gem_key', key); }, [key]);
            useEffect(() => { localStorage.setItem('ds_key', dsKey); }, [dsKey]);
            useEffect(() => { localStorage.setItem('cl_key', claudeKey); }, [claudeKey]);
            useEffect(() => { localStorage.setItem('oa_key', openaiKey); }, [openaiKey]);
            useEffect(() => { groupId ? localStorage.setItem('cloud_group_id', groupId) : localStorage.removeItem('cloud_group_id'); }, [groupId]);
            useEffect(() => { groupCode ? localStorage.setItem('cloud_group_code', groupCode) : localStorage.removeItem('cloud_group_code'); }, [groupCode]);
            useEffect(() => { groupName ? localStorage.setItem('cloud_group_name', groupName) : localStorage.removeItem('cloud_group_name'); }, [groupName]);
            useEffect(() => { nickname ? localStorage.setItem('cloud_nickname', nickname) : localStorage.removeItem('cloud_nickname'); }, [nickname]);

            // ─── Cloud: initial fetch + realtime subscription ───
            useEffect(() => {
                if (!cloudMode || !sbRef.current) return;
                const sb = sbRef.current;
                let alive = true;
                setSyncStatus('connecting');

                const itemFromRow = (r) => ({
                    id: r.id, name: r.name, places: r.places || ['General'], category: r.category || 'Otros',
                    status: r.status, isEssential: !!r.is_essential, lastBought: r.last_bought,
                    qty: r.qty || '', price: r.price ?? '', expiry: r.expiry || ''
                });

                const isUuid = (s) => typeof s === 'string' && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s);

                (async () => {
                    const [{ data: rows, error: e1 }, { data: tagRows }, { data: memberRows }] = await Promise.all([
                        sb.from('items').select('*').eq('group_id', groupId),
                        sb.from('saved_tags').select('tag').eq('group_id', groupId),
                        sb.from('group_members').select('member_id, nickname').eq('group_id', groupId),
                    ]);
                    if (!alive) return;
                    if (e1) { setSyncStatus('error'); return; }
                    const fetched = (rows || []).map(itemFromRow);
                    const cloudIds = new Set(fetched.map(i => i.id));
                    // Migrate local-only items into the group: keep them, regenerate non-UUID ids
                    const localOnly = items.filter(i => !cloudIds.has(i.id)).map(i => isUuid(i.id) ? i : { ...i, id: newId() });
                    const merged = [...fetched, ...localOnly];
                    lastSyncedRef.current = fetched; // localOnly will be detected by diff and pushed
                    if (localOnly.length === 0) remoteApplyRef.current = true;
                    setItems(merged);
                    if (tagRows && tagRows.length) setSavedTags(prev => Array.from(new Set(['General', ...prev, ...tagRows.map(t => t.tag)])));
                    setMembers(memberRows || []);
                    setSyncStatus('online');
                })();

                channelRef.current = sb.channel(`group:${groupId}`)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'items', filter: `group_id=eq.${groupId}` }, async () => {
                        const { data } = await sb.from('items').select('*').eq('group_id', groupId);
                        if (!alive || !data) return;
                        const fetched = data.map(itemFromRow);
                        remoteApplyRef.current = true;
                        lastSyncedRef.current = fetched;
                        setItems(fetched);
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'group_members', filter: `group_id=eq.${groupId}` }, async () => {
                        const { data } = await sb.from('group_members').select('member_id, nickname').eq('group_id', groupId);
                        if (alive && data) setMembers(data);
                    })
                    .subscribe();

                return () => {
                    alive = false;
                    if (channelRef.current) { sb.removeChannel(channelRef.current); channelRef.current = null; }
                };
            }, [cloudMode, groupId]);

            // ─── Cloud: diff items vs last synced and push changes ───
            useEffect(() => {
                if (!cloudMode || !sbRef.current) return;
                if (remoteApplyRef.current) { remoteApplyRef.current = false; return; }
                const sb = sbRef.current;
                const prev = lastSyncedRef.current;
                const prevMap = new Map(prev.map(i => [i.id, i]));
                const nextMap = new Map(items.map(i => [i.id, i]));
                const toUpsert = [];
                const toDelete = [];
                for (const [id, it] of nextMap) {
                    const p = prevMap.get(id);
                    if (!p || JSON.stringify(p) !== JSON.stringify(it)) toUpsert.push(it);
                }
                for (const id of prevMap.keys()) if (!nextMap.has(id)) toDelete.push(id);
                if (toUpsert.length === 0 && toDelete.length === 0) return;

                (async () => {
                    try {
                        if (toUpsert.length) {
                            const rows = toUpsert.map(i => ({
                                id: i.id, group_id: groupId, name: i.name, places: i.places,
                                category: i.category, status: i.status, is_essential: !!i.isEssential,
                                last_bought: i.lastBought || null, qty: i.qty || '',
                                price: i.price === '' || i.price == null ? null : Number(i.price),
                                expiry: i.expiry || null
                            }));
                            const { error } = await sb.from('items').upsert(rows);
                            if (error) throw error;
                        }
                        if (toDelete.length) {
                            const { error } = await sb.from('items').delete().in('id', toDelete);
                            if (error) throw error;
                        }
                        lastSyncedRef.current = items;
                        setSyncStatus('online');
                    } catch (e) {
                        console.error('sync failed', e);
                        setSyncStatus('error');
                    }
                })();
            }, [items, cloudMode, groupId]);

            // Re-attempt sync when network returns
            useEffect(() => {
                if (!cloudMode) return;
                const onOnline = () => { setSyncStatus('connecting'); lastSyncedRef.current = []; setItems(prev => [...prev]); };
                window.addEventListener('online', onOnline);
                return () => window.removeEventListener('online', onOnline);
            }, [cloudMode]);

            // ─── Cloud: group operations ───
            const cloudCreateGroup = async (gName, gNick) => {
                const sb = sbRef.current; if (!sb) return { error: 'Supabase no inicializado' };
                await sb.auth.getSession().then(({ data }) => { if (!data.session) return sb.auth.signInAnonymously(); });
                const { data, error } = await sb.rpc('create_group', { p_name: gName, p_nickname: gNick });
                if (error) return { error: error.message };
                const row = Array.isArray(data) ? data[0] : data;
                setGroupName(gName); setNickname(gNick);
                setGroupId(row.group_id); setGroupCode(row.code);
                return { code: row.code };
            };

            const cloudJoinGroup = async (code, gNick) => {
                const sb = sbRef.current; if (!sb) return { error: 'Supabase no inicializado' };
                await sb.auth.getSession().then(({ data }) => { if (!data.session) return sb.auth.signInAnonymously(); });
                const { data, error } = await sb.rpc('join_group', { p_code: code.trim().toUpperCase(), p_nickname: gNick });
                if (error) return { error: error.message };
                const { data: g } = await sb.from('groups').select('name').eq('id', data).single();
                setGroupName(g?.name || 'Grupo'); setGroupCode(code.trim().toUpperCase()); setNickname(gNick);
                setGroupId(data);
                return { ok: true };
            };

            const cloudLeaveGroup = () => {
                if (channelRef.current && sbRef.current) { sbRef.current.removeChannel(channelRef.current); channelRef.current = null; }
                setGroupId(null); setGroupCode(null); setGroupName(null);
                setMembers([]); setSyncStatus('offline');
                lastSyncedRef.current = [];
            };

            const cloudUploadLocal = async () => {
                const sb = sbRef.current; if (!sb || !groupId) return;
                const localItems = items;
                if (!localItems.length) return;
                const isUuid = (s) => typeof s === 'string' && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s);
                const normalized = localItems.map(i => isUuid(i.id) ? i : { ...i, id: newId() });
                const rows = normalized.map(i => ({
                    id: i.id, group_id: groupId, name: i.name, places: i.places,
                    category: i.category, status: i.status, is_essential: !!i.isEssential,
                    last_bought: i.lastBought || null, qty: i.qty || '',
                    price: i.price === '' || i.price == null ? null : Number(i.price),
                    expiry: i.expiry || null
                }));
                const { error } = await sb.from('items').upsert(rows);
                if (!error) {
                    setItems(normalized);
                    lastSyncedRef.current = normalized;
                }
                return { error: error?.message };
            };

            const handleSmartDelete = (item) => {
                if (item.status === 'stocked') {
                    setConfirmData({
                        isOpen: true,
                        msg: `¿Qué pasó con ${item.name}?`,
                        action: () => { 
                            setItems(prev => prev.map(i => i.id === item.id ? { ...i, status: item.isEssential ? 'needed' : 'inactive' } : i));
                            setConfirmData({ isOpen: false });
                        },
                        actionText: item.isEssential ? "Falta (Esencial)" : "Se acabó (Guardar)",
                        altAction: () => { 
                            setItems(prev => prev.filter(i => i.id !== item.id));
                            setConfirmData({ isOpen: false });
                        },
                        altText: "Borrar Definitivo"
                    });
                } else if (item.status === 'inactive') {
                     setConfirmData({
                        isOpen: true,
                        msg: `¿Borrar definitivamente del historial?`,
                        action: () => { 
                            setItems(prev => prev.filter(i => i.id !== item.id));
                            setConfirmData({ isOpen: false });
                        },
                        actionText: "Sí, borrar",
                        altAction: () => setConfirmData({ isOpen: false }),
                        altText: "Cancelar"
                    });
                } else {
                    setConfirmData({
                        isOpen: true,
                        msg: '¿Eliminar de la lista?',
                        action: () => { setItems(prev => prev.filter(i => i.id !== item.id)); setConfirmData({ isOpen: false }); },
                        actionText: "Eliminar"
                    });
                }
            };

            const requestCheckout = () => {
                const count = items.filter(i => i.status === 'cart').length;
                if (count === 0) return;
                setConfirmData({
                    isOpen: true,
                    msg: `¿Mover ${count} productos a Casa?`,
                    action: () => {
                        const snapshot = items;
                        setItems(prev => prev.map(i => i.status === 'cart' ? { ...i, status: 'stocked', lastBought: todayISO() } : i));
                        setTab('inv');
                        setConfirmData({ isOpen: false });
                        if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
                        setUndoSnapshot({ items: snapshot, label: `${count} productos a Casa` });
                        undoTimerRef.current = setTimeout(() => setUndoSnapshot(null), 5000);
                    },
                    actionText: "Finalizar Compra"
                });
            };

            const handleExportCSV = () => {
                const headers = ["ID,Nombre,Lugares,Categoria,Estado,Esencial,UltimaCompra,Cantidad,Precio,Caducidad"];
                const rows = items.map(i => 
                    `${i.id},"${i.name.replace(/"/g, '""')}","${i.places.join('|')}","${i.category||'Otros'}","${i.status}","${i.isEssential?'Si':'No'}","${i.lastBought||''}","${i.qty||''}","${i.price||''}","${i.expiry||''}"`
                );
                const csvContent = "data:text/csv;charset=utf-8," + [headers, ...rows].join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `misuper_backup_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const parseCSVLine = (line) => {
                const out = []; let cur = ''; let q = false;
                for (let i = 0; i < line.length; i++) {
                    const ch = line[i];
                    if (q) {
                        if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
                        else if (ch === '"') { q = false; }
                        else { cur += ch; }
                    } else {
                        if (ch === ',') { out.push(cur); cur = ''; }
                        else if (ch === '"' && cur === '') { q = true; }
                        else { cur += ch; }
                    }
                }
                out.push(cur);
                return out;
            };

            const handleImportCSV = (e) => {
                const f = e.target.files[0]; if (!f) return;
                const r = new FileReader();
                r.onload = (evt) => {
                    const lines = evt.target.result.split(/\r?\n/);
                    const validStatuses = ['needed', 'cart', 'stocked', 'inactive'];
                    const n = lines.slice(1).map(line => {
                        if (!line.trim()) return null;
                        const c = parseCSVLine(line);
                        if (!c[1]) return null;
                        const status = validStatuses.includes(c[4]) ? c[4] : 'stocked';
                        return {
                            id: newId(),
                            name: c[1] || 'Item',
                            places: c[2] ? c[2].split('|').filter(Boolean) : ['General'],
                            category: c[3] || 'Otros',
                            status,
                            isEssential: c[5] === 'Si',
                            lastBought: c[6] || null,
                            qty: c[7] || '',
                            price: c[8] || '',
                            expiry: c[9] || ''
                        };
                    }).filter(Boolean);
                    if (n.length) {
                        setConfirmData({
                            isOpen: true,
                            msg: `¿Importar ${n.length} productos?`,
                            action: () => { setItems(prev => [...prev, ...n]); setConfirmData({ isOpen: false }); },
                            actionText: "Importar"
                        });
                    }
                };
                r.readAsText(f); e.target.value = '';
            };

            // --- IA LOGIC (DeepSeek + Gemini, structured output) ---
            // ─── AI provider functions ───
            const callGemini = async (textPrompt, imageData, wantJson) => {
                const parts = [{ text: textPrompt }];
                if (imageData) parts.push({ inline_data: { mime_type: imageData.mime, data: imageData.data } });
                const body = { contents: [{ parts }] };
                if (wantJson) body.generationConfig = { responseMimeType: "application/json" };
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error.message || 'Gemini error');
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
            };

            const callDeepSeek = async (textPrompt, imageData, wantJson) => {
                if (imageData) throw new Error('DeepSeek no soporta imágenes');
                const body = {
                    model: "deepseek-chat",
                    messages: [
                        { role: "system", content: "Eres un asistente de inventario experto." },
                        { role: "user", content: textPrompt }
                    ],
                    stream: false
                };
                if (wantJson) body.response_format = { type: "json_object" };
                const res = await fetch("https://api.deepseek.com/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${dsKey}` },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error.message || 'DeepSeek error');
                return data.choices?.[0]?.message?.content || "";
            };

            const callClaude = async (textPrompt, imageData, wantJson) => {
                const userContent = imageData
                    ? [
                        { type: 'image', source: { type: 'base64', media_type: imageData.mime, data: imageData.data } },
                        { type: 'text', text: textPrompt }
                      ]
                    : textPrompt;
                const body = {
                    model: 'claude-haiku-4-5',
                    max_tokens: 2048,
                    system: wantJson
                        ? 'Eres un asistente de inventario experto. Responde SOLO con JSON válido. Sin markdown, sin explicaciones, solo el JSON.'
                        : 'Eres un asistente de inventario experto.',
                    messages: [{ role: 'user', content: userContent }]
                };
                const res = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': claudeKey,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error.message || 'Claude error');
                return data.content?.[0]?.text || "";
            };

            const callOpenAI = async (textPrompt, imageData, wantJson) => {
                const userContent = imageData
                    ? [
                        { type: 'text', text: textPrompt },
                        { type: 'image_url', image_url: { url: `data:${imageData.mime};base64,${imageData.data}` } }
                      ]
                    : textPrompt;
                const body = {
                    model: 'gpt-4o-mini',
                    messages: [
                        { role: 'system', content: wantJson
                            ? 'Eres un asistente de inventario experto. Responde SOLO con JSON válido.'
                            : 'Eres un asistente de inventario experto.' },
                        { role: 'user', content: userContent }
                    ]
                };
                if (wantJson) body.response_format = { type: 'json_object' };
                const res = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${openaiKey}` },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error.message || 'OpenAI error');
                return data.choices?.[0]?.message?.content || "";
            };

            // Dispatcher: picks the best available provider for the task and falls back on error
            const callAI = async (textPrompt, imageData = null, wantJson = false) => {
                setLoading(true); setResult(null);

                const providers = {
                    gemini:   { has: !!key,       vision: true,  fn: callGemini   },
                    claude:   { has: !!claudeKey, vision: true,  fn: callClaude   },
                    openai:   { has: !!openaiKey, vision: true,  fn: callOpenAI   },
                    deepseek: { has: !!dsKey,     vision: false, fn: callDeepSeek }
                };

                const order = imageData
                    ? ['gemini', 'claude', 'openai']                          // vision required
                    : (wantJson
                        ? ['deepseek', 'gemini', 'openai', 'claude']         // structured (cheap first)
                        : ['claude', 'openai', 'gemini', 'deepseek']);       // free-form (quality first)

                const errors = [];
                for (const name of order) {
                    const p = providers[name];
                    if (!p.has) continue;
                    if (imageData && !p.vision) continue;
                    try {
                        const out = await p.fn(textPrompt, imageData, wantJson);
                        setLoading(false);
                        return out;
                    } catch (e) {
                        console.error(`${name} falló:`, e);
                        errors.push(`${name}: ${e.message}`);
                    }
                }

                setLoading(false);
                if (errors.length === 0) {
                    setResult(imageData
                        ? "⚠️ Para tickets necesitas API key de Gemini, Claude u OpenAI."
                        : "⚠️ Configura al menos una API Key en Ajustes.");
                } else {
                    setResult("Todos los providers fallaron · " + errors.join(' | '));
                }
                return null;
            };

            const cleanJSON = (text) => {
                if (!text) return text;
                const arr = text.indexOf('['); const obj = text.indexOf('{');
                let s = -1, e = -1;
                if (arr !== -1 && (obj === -1 || arr < obj)) { s = arr; e = text.lastIndexOf(']'); }
                else if (obj !== -1) { s = obj; e = text.lastIndexOf('}'); }
                return (s !== -1 && e !== -1) ? text.substring(s, e + 1) : text;
            };

            const handleDictation = async () => {
                if (!prompt.trim()) return;
                const p = `Analiza: "${prompt}". Devuelve JSON con esta forma exacta: {"items":[{"name":"x","places":["y"],"status":"needed|stocked","qty":"1","expiry":"YYYY-MM-DD","category":"Alimentos|Medicamentos|Limpieza|Hogar|Mascotas|Otros"}]}. Si dice "tengo" usa "stocked". Si no hay categoria, adivina. SOLO JSON, sin markdown.`;
                const raw = await callAI(p, null, true);
                if (raw) {
                    try {
                        const parsed = JSON.parse(cleanJSON(raw));
                        const arr = Array.isArray(parsed) ? parsed : (parsed.items || []);
                        const newItems = arr.map(i => ({
                            id: newId(), name: i.name, places: i.places || ['General'],
                            status: i.status || 'needed', lastBought: i.status === 'stocked' ? todayISO() : null,
                            qty: i.qty || '', price: '', expiry: i.expiry || '', category: i.category || 'Otros', isEssential: false
                        }));
                        setItems(prev => [...prev, ...newItems]);
                        setResult(`✅ ${newItems.length} items agregados.`); setPrompt('');
                    } catch (e) { setResult("La IA no devolvio un formato valido. Intenta de nuevo."); }
                }
            };

            const handleTicketUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setModal('ticket'); setLoading(true);
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onloadend = async () => {
                    const base64Data = reader.result.split(',')[1];
                    const mimeType = file.type;
                    const promptText = `Analiza ticket de compra. Extrae productos y precios. Devuelve JSON con esta forma exacta: {"items":[{"name":"Prod","price":10.50,"qty":"1"}]}. SOLO JSON.`;
                    const text = await callAI(promptText, { mime: mimeType, data: base64Data }, true);
                    if (text) {
                        try {
                            const parsed = JSON.parse(cleanJSON(text));
                            const ticketItems = Array.isArray(parsed) ? parsed : (parsed.items || []);
                            if (ticketItems.length === 0) { setResult("Ticket procesado pero no se detectaron productos."); return; }
                            let added = 0, updated = 0;
                            setItems(prev => {
                                const list = [...prev];
                                ticketItems.forEach(t => {
                                    const idx = list.findIndex(i => i.name.toLowerCase().includes(t.name.toLowerCase()));
                                    if (idx >= 0) {
                                        list[idx] = { ...list[idx], price: t.price, lastBought: todayISO(), status: 'stocked' };
                                        updated++;
                                    } else {
                                        list.push({ id: newId(), name: t.name, places: ['Ticket'], status: 'stocked', lastBought: todayISO(), qty: t.qty || '1', price: t.price, expiry: '', category: 'Otros', isEssential: false });
                                        added++;
                                    }
                                });
                                return list;
                            });
                            setResult(`🧾 Ticket: ${added} nuevos, ${updated} actualizados.`);
                        } catch (err) { setResult("Error procesando datos del ticket."); }
                    }
                };
            };

            const handleChef = async () => {
                const stock = items.filter(i=>i.status==='stocked').map(i=>`${i.name} (${i.qty||''})`).join(', ');
                if(!stock) { setResult("Alacena vacía."); return; }
                const raw = await callAI(`Soy chef. Tengo: ${stock}. Crea receta corta. Título divertido.`);
                setResult(raw);
            };

            const addItem = (e) => {
                if (e) e.preventDefault(); if (!name.trim()) return;
                const existing = items.find(i => i.name.toLowerCase() === name.toLowerCase() && i.status === 'inactive');
                if (existing) {
                    setItems(items.map(i => i.id === existing.id ? { ...i, status: tab === 'inv' ? 'stocked' : 'needed' } : i));
                } else {
                    setItems([...items, { id: newId(), name, places: selTags, status: tab === 'inv' ? 'stocked' : 'needed', lastBought: tab === 'inv' ? todayISO() : null, qty: '', price: '', expiry: '', category: 'Otros', isEssential: false }]);
                }
                setName(''); setSelTags(['General']);
            };
            
            const toggleTag = (t) => { if(selTags.includes(t)) { if(selTags.length>1) setSelTags(selTags.filter(x=>x!==t)); } else setSelTags([...selTags, t]); };
            const addTag = () => { if(tagInput && !savedTags.includes(tagInput)){ setSavedTags([...savedTags, tagInput]); setSelTags([...selTags, tagInput]); setTagInput(''); } };
            const openEdit = (item) => { setEditItem({...item}); setModal('edit'); };
            const saveEdit = () => { setItems(items.map(i => i.id === editItem.id ? editItem : i)); setModal(null); setEditItem(null); };

            const displayItems = () => {
                if(tab==='shop') return items.filter(i => (i.status==='needed'||i.status==='cart') && (filter==='Todos'||i.places.includes(filter)||i.places.includes('General')));
                if(tab==='inv') {
                    let base = items.filter(i => i.status==='stocked');
                    if(invFilter === 'Agotados') base = items.filter(i => i.status==='inactive'); 
                    else if(invFilter !== 'Todos') base = base.filter(i => i.category === invFilter);
                    return base;
                }
                if(tab==='hist') return items.filter(i => i.lastBought);
                return [];
            };
            const list = displayItems();

            // --- AUDIO RECORDING (Browser API) ---
            const startListening = () => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) { alert("Navegador no soporta dictado."); return; }
                const rec = new SR();
                rec.lang = 'es-MX'; rec.continuous = true; rec.interimResults = true;
                rec.onstart = () => setIsListening(true);
                rec.onend = () => setIsListening(false);
                rec.onerror = (e) => { setIsListening(false); if(e.error!=='no-speech') alert("Error: "+e.error); };
                rec.onresult = (e) => {
                    let final = '';
                    for (let i = e.resultIndex; i < e.results.length; ++i) if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
                    if (final) setPrompt(p => (p + ' ' + final).trim());
                };
                recognitionRef.current = rec;
                rec.start();
            };
            const toggleListening = () => { if(isListening && recognitionRef.current) { recognitionRef.current.stop(); setIsListening(false); } else startListening(); };

            return (
                <div className="w-full h-full sm:h-[90vh] sm:max-w-[420px] bg-white sm:rounded-[30px] shadow-2xl flex flex-col relative overflow-hidden text-gray-800">
                    {updateReady && (
                        <div className="absolute top-0 left-0 right-0 bg-amber-500 text-white px-4 py-2 text-xs flex justify-between items-center z-[70] shadow-md ios-header">
                            <span className="font-bold">Hay una versión nueva</span>
                            <button onClick={applyUpdate} className="bg-white text-amber-700 px-3 py-1 rounded-md font-bold text-[11px]">Recargar</button>
                        </div>
                    )}
                    <div className="bg-indigo-600 px-5 pb-4 ios-header text-white rounded-b-[24px] shadow-lg shrink-0 z-10">
                        <div className="flex justify-between items-center mb-4 mt-2">
                            <div className="flex flex-col">
                                <h1 className="text-xl font-bold flex items-center gap-2"><Icon name="ShoppingBag"/> Mi Súper</h1>
                                {cloudMode && (
                                    <p className="text-[10px] text-indigo-200 mt-0.5 flex items-center gap-1">
                                        <span className={`w-1.5 h-1.5 rounded-full ${syncStatus === 'online' ? 'bg-green-400' : syncStatus === 'connecting' ? 'bg-yellow-400 animate-pulse' : 'bg-red-400'}`}></span>
                                        {groupName} · {members.length || 1} {members.length === 1 ? 'miembro' : 'miembros'}
                                    </p>
                                )}
                            </div>
                            <div className="flex gap-2">
                                <label className="p-2 bg-white/20 rounded-full hover:bg-white/30 cursor-pointer"><Icon name="Camera"/><input type="file" accept="image/*" className="hidden" onChange={handleTicketUpload}/></label>
                                <button onClick={()=>{setModal('dictate'); setResult(null)}} className="p-2 bg-white/20 rounded-full"><Icon name="Mic"/></button>
                                <button onClick={()=>{setModal('chef'); setResult(null); handleChef();}} className="p-2 bg-white/20 rounded-full"><Icon name="Chef"/></button>
                                <button onClick={()=>setModal('settings')} className="p-2 bg-white/20 rounded-full"><Icon name="Settings"/></button>
                            </div>
                        </div>
                        <div className="bg-white/10 backdrop-blur p-2 rounded-xl border border-white/20">
                            <div className="flex gap-2 mb-2">
                                <input value={name} onChange={e=>setName(e.target.value)} placeholder={tab==='inv'?"Agregar a Casa...":"¿Qué falta?"} className="bg-transparent w-full text-white placeholder-indigo-200 outline-none font-medium"/>
                                <button onClick={addItem} disabled={!name} className="bg-white text-indigo-600 p-2 rounded-lg"><Icon name="Plus"/></button>
                            </div>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                <div className="flex items-center gap-1 bg-white/20 px-2 py-1 rounded-lg shrink-0"><Icon name="Plus" size={10}/><input value={tagInput} onChange={e=>setTagInput(e.target.value)} onBlur={addTag} onKeyDown={e=>e.key==='Enter'&&addTag()} placeholder="Etiqueta" className="bg-transparent w-14 text-xs text-white outline-none placeholder-indigo-300"/></div>
                                {savedTags.map(t=>(<button key={t} onClick={()=>toggleTag(t)} className={`px-2 py-1 rounded-lg text-[10px] font-bold whitespace-nowrap transition ${selTags.includes(t)?'bg-white text-indigo-700':'bg-indigo-800/50 text-indigo-200 border border-indigo-500/30'}`}>{t} {selTags.includes(t)&&'✓'}</button>))}
                            </div>
                        </div>
                    </div>

                    <div className="flex border-b border-gray-100 shrink-0">
                        {[{id:'shop',icon:'ShoppingBag',l:'Lista'},{id:'inv',icon:'Home',l:'Casa'},{id:'hist',icon:'History',l:'Historial'}].map(x=>(<button key={x.id} onClick={()=>setTab(x.id)} className={`flex-1 py-3 flex flex-col items-center gap-1 text-[10px] font-bold ${tab===x.id?'text-indigo-600 bg-indigo-50':'text-gray-400'}`}><Icon name={x.icon} size={20} className={tab===x.id?'stroke-[2.5]':'stroke-2'}/> {x.l}</button>))}
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50 pb-safe-bottom safe-bottom">
                        {tab==='shop' && (
                            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                <button onClick={()=>setFilter('Todos')} className={`px-3 py-1 rounded-full text-xs font-bold border ${filter==='Todos'?'bg-gray-800 text-white':'bg-white text-gray-500'}`}>Todos</button>
                                {savedTags.filter(x=>x!=='General').map(t=>(<button key={t} onClick={()=>setFilter(t)} className={`px-3 py-1 rounded-full text-xs font-bold border whitespace-nowrap ${filter===t?'bg-gray-800 text-white':'bg-white text-gray-500'}`}>{t}</button>))}
                            </div>
                        )}
                        {tab==='inv' && (
                            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1 mb-2">
                                <button onClick={()=>setInvFilter('Todos')} className={`px-3 py-1 rounded-full text-xs font-bold border ${invFilter==='Todos'?'bg-green-600 text-white':'bg-white text-gray-500'}`}>Todos</button>
                                {categories.map(c=>(<button key={c} onClick={()=>setInvFilter(c)} className={`px-3 py-1 rounded-full text-xs font-bold border whitespace-nowrap ${invFilter===c?'bg-green-600 text-white':'bg-white text-gray-500'}`}>{c}</button>))}
                                <button onClick={()=>setInvFilter('Agotados')} className={`px-3 py-1 rounded-full text-xs font-bold border bg-gray-200 text-gray-600 ${invFilter==='Agotados'?'border-gray-400 bg-gray-300':''}`}>Agotados</button>
                            </div>
                        )}
                        {(tab==='inv' || tab==='hist') && (
                            <div className="flex justify-end mb-2">
                                <button onClick={handleExportCSV} className="bg-white border text-indigo-600 px-3 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1"><Icon name="Download" size={12}/> Exportar CSV</button>
                                {tab==='inv' && <div className="ml-2 relative overflow-hidden"><button className="bg-white border text-gray-600 px-3 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1"><Icon name="Upload" size={12}/> Importar</button><input type="file" accept=".csv" onChange={handleImportCSV} className="absolute inset-0 opacity-0"/></div>}
                            </div>
                        )}

                        {!list.length && <div className="text-center py-10 text-gray-400 text-sm">Nada por aquí 🦗</div>}
                        
                        {list.map(i => (
                            <div key={i.id} className={`p-3 rounded-xl border flex flex-col gap-2 shadow-sm transition animate-enter bg-white ${i.status==='cart'?'bg-green-50 border-green-200 opacity-60':''} ${i.status==='inactive'?'opacity-70 bg-gray-50':''}`}>
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-3 overflow-hidden flex-1 cursor-pointer" onClick={()=>{
                                        if(tab==='shop') setItems(items.map(x=>x.id===i.id?{...x,status:i.status==='needed'?'cart':'needed'}:x));
                                        if(i.status==='inactive') setItems(items.map(x=>x.id===i.id?{...x,status:'stocked'}:x)); // Reactivar
                                    }}>
                                        <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0 ${i.status==='cart'?'bg-green-500 border-green-500':'border-gray-300'}`}>{i.status==='cart'&&<Icon name="Check" size={12} className="text-white"/>}</div>
                                        <div className="min-w-0">
                                            <p className={`font-semibold text-sm ${i.status==='cart'&&'line-through'} flex items-center gap-1`}>
                                                {i.name}
                                                {i.isEssential && <Icon name="Star" size={12} className="text-yellow-400 fill-current"/>}
                                            </p>
                                            <p className="text-[10px] text-gray-500">{i.category} • {i.places.join(', ')}</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        {/* BOTÓN MÁGICO PARA PASAR A LISTA */}
                                        {(tab==='inv' && i.status!=='inactive') && (
                                            <button onClick={()=>setItems(items.map(x=>x.id===i.id?{...x,status:'needed'}:x))} className="p-1.5 bg-indigo-50 text-indigo-600 rounded-lg"><Icon name="Plus" size={16}/></button>
                                        )}
                                        <button onClick={()=>openEdit(i)} className="text-gray-300 hover:text-indigo-500"><Icon name="Edit" size={16}/></button>
                                        <button onClick={()=>handleSmartDelete(i)} className="text-gray-300 hover:text-red-500"><Icon name="Trash" size={16}/></button>
                                    </div>
                                </div>
                                {(i.qty || i.price || i.expiry) && (
                                    <div className="flex gap-3 text-[10px] text-gray-500 border-t pt-1 mt-1">
                                        {i.qty && <span className="bg-gray-100 px-1 rounded">{i.qty}</span>}
                                        {i.price && <span className="bg-green-50 text-green-700 px-1 rounded">${i.price}</span>}
                                        {i.expiry && <span className="flex items-center gap-1 bg-red-50 text-red-600 px-1 rounded"><Icon name="Clock" size={10}/> {i.expiry}</span>}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    {tab==='shop' && items.some(i=>i.status==='cart') && (
                        <div className="absolute bottom-4 left-4 right-4 animate-enter pb-safe-bottom">
                            <button onClick={requestCheckout} className="w-full bg-gray-900 text-white p-4 rounded-xl shadow-xl flex justify-between items-center"><span className="font-bold text-sm ml-2">Finalizar Compra ({items.filter(i=>i.status==='cart').length})</span><div className="bg-white/20 p-1 rounded-full mr-2"><Icon name="ArrowRight"/></div></button>
                        </div>
                    )}

                    {undoSnapshot && (
                        <div className="absolute bottom-4 left-4 right-4 toast-enter pb-safe-bottom z-30">
                            <div className="bg-gray-900 text-white p-3 rounded-xl shadow-xl flex justify-between items-center">
                                <span className="text-sm">✓ {undoSnapshot.label}</span>
                                <button onClick={() => { setItems(undoSnapshot.items); setUndoSnapshot(null); if (undoTimerRef.current) clearTimeout(undoTimerRef.current); }} className="bg-white/20 px-3 py-1 rounded-lg text-xs font-bold">Deshacer</button>
                            </div>
                        </div>
                    )}

                    {confirmData.isOpen && (
                        <div className="absolute inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-6 animate-enter">
                            <div className="bg-white w-full max-w-sm rounded-2xl p-6 text-center shadow-2xl">
                                <h3 className="font-bold text-lg mb-2 text-gray-800">{confirmData.msg}</h3>
                                <div className="flex flex-col gap-2 mt-4">
                                    <button onClick={confirmData.action} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg">{confirmData.actionText}</button>
                                    {confirmData.altAction && <button onClick={confirmData.altAction} className="w-full py-3 bg-red-100 text-red-600 rounded-xl font-bold">{confirmData.altText}</button>}
                                    <button onClick={()=>setConfirmData({isOpen:false})} className="w-full py-2 text-gray-400 text-sm font-bold">Cancelar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {modal && !confirmData.isOpen && (
                        <div className="absolute inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-4">
                            <div className="bg-white w-full rounded-2xl p-5 shadow-2xl animate-enter max-h-[85%] overflow-auto">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-lg flex gap-2 items-center">
                                        {modal==='settings' && <><Icon name="Settings"/> Ajustes</>}
                                        {modal==='edit' && <><Icon name="Edit"/> Editar</>}
                                        {modal==='dictate' && <><Icon name="Mic"/> Dictado AI</>}
                                        {modal==='chef' && <><Icon name="Chef"/> Chef AI</>}
                                        {modal==='ticket' && <><Icon name="Camera"/> Ticket AI</>}
                                    </h3>
                                    <button onClick={()=>{setModal(null); setEditItem(null); setResult(null)}} className="bg-gray-100 p-1 rounded-full"><Icon name="X"/></button>
                                </div>

                                {modal === 'edit' && editItem && (
                                    <div className="space-y-3">
                                        <input value={editItem.name} onChange={e=>setEditItem({...editItem, name:e.target.value})} className="w-full border p-2 rounded-lg font-bold" placeholder="Nombre"/>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div><label className="text-[10px] font-bold text-gray-500">Cantidad</label><input value={editItem.qty} onChange={e=>setEditItem({...editItem, qty:e.target.value})} className="w-full border p-2 rounded-lg"/></div>
                                            <div><label className="text-[10px] font-bold text-gray-500">Precio</label><input type="number" value={editItem.price} onChange={e=>setEditItem({...editItem, price:e.target.value})} className="w-full border p-2 rounded-lg"/></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>
                                                <label className="text-[10px] font-bold text-gray-500">Categoría</label>
                                                <select value={editItem.category} onChange={e=>setEditItem({...editItem, category:e.target.value})} className="w-full border p-2 rounded-lg bg-white">{categories.map(c=><option key={c} value={c}>{c}</option>)}</select>
                                            </div>
                                            <div><label className="text-[10px] font-bold text-gray-500">Caducidad</label><input type="date" value={editItem.expiry} onChange={e=>setEditItem({...editItem, expiry:e.target.value})} className="w-full border p-2 rounded-lg"/></div>
                                        </div>
                                        <div><label className="text-[10px] font-bold text-gray-500">Lugares (separados por coma)</label><input value={editItem.places.join(', ')} onChange={e=>setEditItem({...editItem, places:e.target.value.split(',').map(s=>s.trim())})} className="w-full border p-2 rounded-lg"/></div>
                                        <div className="flex items-center gap-2 border p-3 rounded-lg bg-yellow-50 border-yellow-100" onClick={()=>setEditItem({...editItem, isEssential: !editItem.isEssential})}>
                                            <div className={`w-5 h-5 rounded border flex items-center justify-center ${editItem.isEssential?'bg-yellow-400 border-yellow-400':'bg-white border-gray-300'}`}>{editItem.isEssential && <Icon name="Check" size={12} className="text-white"/>}</div>
                                            <span className="text-sm font-bold text-yellow-800 flex items-center gap-1">Marcar Esencial <Icon name="Star" size={14}/></span>
                                        </div>
                                        <button onClick={saveEdit} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mt-2">Guardar Cambios</button>
                                    </div>
                                )}

                                {modal === 'settings' && (
                                    <div className="space-y-4">
                                        {cloudConfigured && cloudMode && (
                                            <div className="bg-green-50 border border-green-200 rounded-lg p-3">
                                                <div className="flex items-center justify-between mb-2">
                                                    <p className="text-xs font-bold text-green-900">Grupo: {groupName}</p>
                                                    <span className="text-[10px] text-green-700">{members.length || 1} miembros</span>
                                                </div>
                                                <p className="text-[10px] text-green-700 mb-2">Código: <span className="font-mono font-bold tracking-wider">{groupCode}</span></p>
                                                <div className="flex gap-2">
                                                    <button onClick={async ()=>{
                                                        const text = `Únete a "${groupName}" en Mi Súper con el código ${groupCode}\n${location.origin}${location.pathname}`;
                                                        try { if (navigator.share) await navigator.share({ text }); else { await navigator.clipboard.writeText(text); alert('Copiado'); } } catch {}
                                                    }} className="flex-1 bg-white border border-green-300 text-green-700 py-1.5 rounded text-xs font-bold">Compartir código</button>
                                                    <button onClick={()=>{
                                                        setConfirmData({
                                                            isOpen: true, msg: `¿Salir de "${groupName}"? Tus listas locales no se borran.`, actionText: "Salir",
                                                            action: () => { cloudLeaveGroup(); setConfirmData({isOpen:false}); setModal(null); },
                                                            altAction: () => setConfirmData({isOpen:false}), altText: "Cancelar"
                                                        });
                                                    }} className="flex-1 bg-white border border-red-300 text-red-700 py-1.5 rounded text-xs font-bold">Salir</button>
                                                </div>
                                                {items.length > 0 && (
                                                    <button onClick={async ()=>{
                                                        const r = await cloudUploadLocal();
                                                        alert(r?.error ? `Error: ${r.error}` : 'Inventario subido al grupo');
                                                    }} className="w-full mt-2 bg-indigo-600 text-white py-1.5 rounded text-xs font-bold">Subir mi inventario actual al grupo</button>
                                                )}
                                            </div>
                                        )}
                                        {cloudConfigured && !cloudMode && (
                                            <div className="bg-gray-50 border rounded-lg p-3">
                                                <p className="text-xs font-bold text-gray-700 mb-2">Modo: solo este dispositivo</p>
                                                <div className="flex gap-2">
                                                    <button onClick={()=>{ setObStep('create'); setObError(null); setObName(''); setObNick(''); setOnboarded(false); setModal(null); }} className="flex-1 bg-indigo-600 text-white py-1.5 rounded text-xs font-bold">Crear grupo</button>
                                                    <button onClick={()=>{ setObStep('join'); setObError(null); setObCode(''); setObNick(''); setOnboarded(false); setModal(null); }} className="flex-1 bg-white border-2 border-indigo-600 text-indigo-600 py-1.5 rounded text-xs font-bold">Unirme</button>
                                                </div>
                                            </div>
                                        )}
                                        <div className="bg-indigo-50 border border-indigo-100 rounded-lg p-3 text-xs text-indigo-900">
                                            <p className="font-bold mb-1">Tus datos viven en tu navegador.</p>
                                            <p>Las API keys se guardan localmente y solo se envían a Google/DeepSeek cuando usas voz, tickets o chef.</p>
                                        </div>
                                        <div className="text-[10px] text-gray-500 -mb-2">Configura uno o varios. La app usa el mejor disponible para cada tarea (visión: Gemini → Claude → OpenAI; texto: DeepSeek → Gemini → OpenAI → Claude).</div>
                                        <div>
                                            <p className="text-xs font-bold text-gray-700 mb-1">Google Gemini</p>
                                            <p className="text-[10px] text-gray-500 mb-1">Gratis. <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" className="text-indigo-600 underline">aistudio.google.com</a></p>
                                            <input value={key} onChange={e=>setKey(e.target.value)} className="w-full border p-2 rounded font-mono text-xs" placeholder="AIza..."/>
                                        </div>
                                        <div>
                                            <p className="text-xs font-bold text-gray-700 mb-1">Anthropic Claude</p>
                                            <p className="text-[10px] text-gray-500 mb-1">Pago, modelo Haiku. <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener" className="text-indigo-600 underline">console.anthropic.com</a></p>
                                            <input value={claudeKey} onChange={e=>setClaudeKey(e.target.value)} className="w-full border p-2 rounded font-mono text-xs" placeholder="sk-ant-..."/>
                                        </div>
                                        <div>
                                            <p className="text-xs font-bold text-gray-700 mb-1">OpenAI</p>
                                            <p className="text-[10px] text-gray-500 mb-1">Pago, modelo gpt-4o-mini. <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener" className="text-indigo-600 underline">platform.openai.com</a></p>
                                            <input value={openaiKey} onChange={e=>setOpenaiKey(e.target.value)} className="w-full border p-2 rounded font-mono text-xs" placeholder="sk-..."/>
                                        </div>
                                        <div>
                                            <p className="text-xs font-bold text-gray-700 mb-1">DeepSeek</p>
                                            <p className="text-[10px] text-gray-500 mb-1">Más barato para texto, sin visión. <a href="https://platform.deepseek.com/api_keys" target="_blank" rel="noopener" className="text-indigo-600 underline">platform.deepseek.com</a></p>
                                            <input value={dsKey} onChange={e=>setDsKey(e.target.value)} className="w-full border p-2 rounded font-mono text-xs" placeholder="sk-..."/>
                                        </div>
                                        <button onClick={()=>setModal(null)} className="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold">Guardar</button>
                                    </div>
                                )}

                                {(modal === 'dictate' || modal === 'chef' || modal === 'ticket') && (
                                    <div className="space-y-3">
                                        {modal === 'dictate' && (
                                            <>
                                                <p className="text-xs text-gray-500">Dicta: "Compré leche, falta huevo..."</p>
                                                <textarea value={prompt} onChange={e=>setPrompt(e.target.value)} className="w-full border p-2 rounded-lg text-sm" rows="3"/>
                                                <div className="flex gap-2">
                                                    <button onClick={toggleListening} className={`flex-1 py-3 rounded-lg font-bold text-white flex justify-center items-center gap-2 ${isListening ? 'mic-active' : 'bg-red-500'}`}>{isListening ? <><Icon name="Stop"/> Parar</> : <><Icon name="Mic"/> Hablar</>}</button>
                                                    <button onClick={handleDictation} disabled={loading} className="flex-1 bg-indigo-600 text-white py-3 rounded-lg font-bold flex justify-center items-center gap-2">{loading ? 'Pensando...' : 'Procesar'}</button>
                                                </div>
                                            </>
                                        )}
                                        {(loading || result) && (
                                            <div className="bg-indigo-50 p-3 rounded-xl border border-indigo-100 text-sm mt-2 text-center">
                                                {loading ? <p className="text-indigo-600 animate-pulse">Pensando...</p> : <><div className="prose prose-sm text-left whitespace-pre-wrap">{result}</div><button onClick={()=>{setResult(null); setPrompt('')}} className="mt-2 w-full bg-white py-1 rounded text-xs font-bold border">Limpiar</button></>}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {!onboarded && (
                        <div className="absolute inset-0 bg-black/70 backdrop-blur-sm z-[60] flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl animate-enter">
                                {obStep === 'welcome' && (<>
                                    <div className="text-center mb-4">
                                        <div className="inline-flex p-3 bg-indigo-100 rounded-2xl mb-3"><Icon name="ShoppingBag" size={32} className="text-indigo-600"/></div>
                                        <h2 className="text-xl font-bold">Bienvenido a Mi Súper</h2>
                                        <p className="text-sm text-gray-500 mt-1">Tu lista inteligente del super.</p>
                                    </div>
                                    <ul className="space-y-2 text-sm text-gray-600 mb-4">
                                        <li className="flex gap-2"><span className="text-indigo-600">✓</span> Lista, casa e historial en un tap</li>
                                        <li className="flex gap-2"><span className="text-indigo-600">✓</span> Voz, tickets y chef con AI (opcional)</li>
                                        <li className="flex gap-2"><span className="text-indigo-600">✓</span> Funciona offline en el super</li>
                                        {cloudConfigured && <li className="flex gap-2"><span className="text-indigo-600">✓</span> Compartir lista con amigos en tiempo real</li>}
                                    </ul>
                                    {cloudConfigured ? (<>
                                        <button onClick={()=>{ setObStep('create'); setObError(null); }} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mb-2">Crear grupo nuevo</button>
                                        <button onClick={()=>{ setObStep('join'); setObError(null); }} className="w-full bg-white border-2 border-indigo-600 text-indigo-600 py-3 rounded-xl font-bold mb-2">Unirme con código</button>
                                        <button onClick={()=>{ localStorage.setItem('onboarded_v1','1'); setOnboarded(true); }} className="w-full bg-gray-100 text-gray-600 py-2 rounded-xl text-sm font-bold">Solo este dispositivo</button>
                                    </>) : (<>
                                        <p className="text-[11px] text-gray-500 bg-gray-50 border rounded-lg p-3 mb-4">
                                            Tus datos viven en tu navegador. Para voz/tickets/chef necesitas una API key (Gemini gratis, o Claude/OpenAI/DeepSeek de pago). Configurable desde Ajustes.
                                        </p>
                                        <button onClick={()=>{ localStorage.setItem('onboarded_v1','1'); setOnboarded(true); setModal('settings'); }} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mb-2">Configurar API Key</button>
                                        <button onClick={()=>{ localStorage.setItem('onboarded_v1','1'); setOnboarded(true); }} className="w-full bg-gray-100 text-gray-600 py-2 rounded-xl text-sm font-bold">Empezar sin AI</button>
                                    </>)}
                                </>)}

                                {obStep === 'create' && (<>
                                    <h2 className="text-xl font-bold mb-1">Crear grupo</h2>
                                    <p className="text-sm text-gray-500 mb-4">Tú serás el primer miembro. Comparte el código con tus amigos para que se unan.</p>
                                    <label className="text-xs font-bold text-gray-700 block mb-1">Nombre del grupo</label>
                                    <input value={obName} onChange={e=>setObName(e.target.value)} placeholder="Familia, Roomies, etc." className="w-full border p-2 rounded-lg mb-3"/>
                                    <label className="text-xs font-bold text-gray-700 block mb-1">Tu nombre en el grupo</label>
                                    <input value={obNick} onChange={e=>setObNick(e.target.value)} placeholder="Pedro" className="w-full border p-2 rounded-lg mb-3"/>
                                    {obError && <p className="text-xs text-red-600 mb-2">{obError}</p>}
                                    <button disabled={!obName.trim() || !obNick.trim() || obLoading} onClick={async ()=>{
                                        setObLoading(true); setObError(null);
                                        const r = await cloudCreateGroup(obName.trim(), obNick.trim());
                                        setObLoading(false);
                                        if (r.error) { setObError(r.error); return; }
                                        setObShareCode(r.code); setObShareName(obName.trim()); setObStep('success');
                                    }} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mb-2 disabled:opacity-50">{obLoading ? 'Creando...' : 'Crear grupo'}</button>
                                    <button onClick={()=>setObStep('welcome')} className="w-full text-gray-500 text-sm py-2">Volver</button>
                                </>)}

                                {obStep === 'join' && (<>
                                    <h2 className="text-xl font-bold mb-1">Unirme con código</h2>
                                    <p className="text-sm text-gray-500 mb-4">Pega el código de 8 letras que te compartieron.</p>
                                    <label className="text-xs font-bold text-gray-700 block mb-1">Código del grupo</label>
                                    <input value={obCode} onChange={e=>setObCode(e.target.value.toUpperCase())} placeholder="AB23PQ12" maxLength={8} className="w-full border p-2 rounded-lg mb-3 font-mono uppercase tracking-widest"/>
                                    <label className="text-xs font-bold text-gray-700 block mb-1">Tu nombre en el grupo</label>
                                    <input value={obNick} onChange={e=>setObNick(e.target.value)} placeholder="Steph" className="w-full border p-2 rounded-lg mb-3"/>
                                    {obError && <p className="text-xs text-red-600 mb-2">{obError}</p>}
                                    <button disabled={obCode.trim().length < 4 || !obNick.trim() || obLoading} onClick={async ()=>{
                                        setObLoading(true); setObError(null);
                                        const r = await cloudJoinGroup(obCode, obNick.trim());
                                        setObLoading(false);
                                        if (r.error) { setObError(r.error === 'group not found' ? 'No encontré ese grupo. Revisa el código.' : r.error); return; }
                                        localStorage.setItem('onboarded_v1','1'); setOnboarded(true);
                                    }} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mb-2 disabled:opacity-50">{obLoading ? 'Uniéndome...' : 'Unirme'}</button>
                                    <button onClick={()=>setObStep('welcome')} className="w-full text-gray-500 text-sm py-2">Volver</button>
                                </>)}

                                {obStep === 'success' && (<>
                                    <div className="text-center mb-4">
                                        <div className="inline-flex p-3 bg-green-100 rounded-2xl mb-3"><Icon name="Check" size={32} className="text-green-600"/></div>
                                        <h2 className="text-xl font-bold">{obShareName} listo</h2>
                                        <p className="text-sm text-gray-500 mt-1">Comparte este código con tus amigos:</p>
                                    </div>
                                    <div className="bg-indigo-50 border-2 border-dashed border-indigo-300 rounded-xl p-4 mb-4 text-center">
                                        <p className="font-mono text-2xl font-bold tracking-widest text-indigo-700">{obShareCode}</p>
                                    </div>
                                    <button onClick={async ()=>{
                                        const text = `Únete a "${obShareName}" en Mi Súper con el código ${obShareCode}\n${location.origin}${location.pathname}`;
                                        try {
                                            if (navigator.share) await navigator.share({ text });
                                            else { await navigator.clipboard.writeText(text); alert('Copiado al portapapeles'); }
                                        } catch {}
                                    }} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mb-2">Compartir código</button>
                                    <button onClick={()=>{ localStorage.setItem('onboarded_v1','1'); setOnboarded(true); }} className="w-full bg-gray-100 text-gray-700 py-2 rounded-xl text-sm font-bold">Empezar</button>
                                </>)}
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SuperApp />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then((reg) => {
                    const announce = (worker) => {
                        if (worker && navigator.serviceWorker.controller) {
                            window.__swWaiting = worker;
                            window.dispatchEvent(new CustomEvent('sw-update-available'));
                        }
                    };
                    if (reg.waiting) announce(reg.waiting);
                    reg.addEventListener('updatefound', () => {
                        const w = reg.installing;
                        if (!w) return;
                        w.addEventListener('statechange', () => {
                            if (w.state === 'installed') announce(w);
                        });
                    });
                    setInterval(() => reg.update().catch(() => {}), 60000);
                }).catch(() => {});

                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (refreshing) return;
                    refreshing = true;
                    window.location.reload();
                });
            });
        }
    </script>
</body>
</html>
