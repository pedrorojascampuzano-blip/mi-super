<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mi Súper">
    <meta name="theme-color" content="#4f46e5">

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="icon.svg">

    <title>Mi Súper</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        .ios-header { padding-top: max(20px, env(safe-area-inset-top)); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-enter { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .mic-active { animation: pulse 1.5s infinite; background-color: #ef4444 !important; border-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        input, textarea, select { font-size: 16px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .toast-enter { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body>
    <div id="root" class="h-screen w-full flex justify-center items-start sm:items-center sm:p-4 bg-gray-100"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            const i = {
                Plus: <path d="M12 5v14M5 12h14" />,
                ShoppingBag: <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z M3 6h18 M16 10a4 4 0 0 1-8 0" />,
                Home: <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10" />,
                History: <path d="M12 8v4l3 3 M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5" />,
                Check: <polyline points="20 6 9 17 4 12" />,
                Trash: <path d="M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6 M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />,
                Mic: <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z M19 10v2a7 7 0 0 1-14 0v-2 M12 19v4 M8 23h8" />,
                Settings: <><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></>,
                Sparkles: <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />,
                Chef: <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z M6 17h12" />,
                X: <><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>,
                ArrowRight: <><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></>,
                Tag: <><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" /><line x1="7" y1="7" x2="7.01" y2="7" /></>,
                Clock: <><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></>,
                Upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12" />,
                Download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M7 10l5 5 5-5 M12 15V3" />,
                Stop: <rect x="6" y="6" width="12" height="12" />,
                Camera: <><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></>,
                Edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></>,
                Star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />,
                Archive: <><polyline points="21 8 21 21 3 21 3 8" /><rect x="1" y="3" width="22" height="5" /><line x1="10" y1="12" x2="14" y2="12" /></>
            };
            return <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{i[name]}</svg>;
        };

        const SuperApp = () => {
            const [key, setKey] = useState(()=>localStorage.getItem('gem_key')||'');
            const [dsKey, setDsKey] = useState(()=>localStorage.getItem('ds_key')||'');
            const [tab, setTab] = useState('shop'); 
            const [items, setItems] = useState(() => { try { return JSON.parse(localStorage.getItem('data_v4')) || []; } catch { return []; } });
            const [savedTags, setSavedTags] = useState(() => { try { return JSON.parse(localStorage.getItem('saved_tags')) || ['General', 'Costco', 'Super', 'Mercado', 'Oxxo']; } catch { return ['General', 'Costco', 'Super', 'Mercado', 'Oxxo']; } });
            const [name, setName] = useState('');
            const [tagInput, setTagInput] = useState('');
            const [selTags, setSelTags] = useState(['General']);
            const [filter, setFilter] = useState('Todos'); 
            const [invFilter, setInvFilter] = useState('Todos'); 
            const [modal, setModal] = useState(null); 
            const [prompt, setPrompt] = useState('');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const [editItem, setEditItem] = useState(null);
            const [confirmData, setConfirmData] = useState({ isOpen: false, msg: '', action: null, altAction: null, altText: '' });
            const recognitionRef = useRef(null);

            const categories = ['Alimentos', 'Medicamentos', 'Limpieza', 'Hogar', 'Mascotas', 'Otros'];

            const newId = () => (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : (Date.now() + '_' + Math.random().toString(36).slice(2));
            const todayISO = () => new Date().toISOString().slice(0, 10);
            const [undoSnapshot, setUndoSnapshot] = useState(null);
            const undoTimerRef = useRef(null);

            useEffect(()=>localStorage.setItem('data_v4', JSON.stringify(items)),[items]);
            useEffect(()=>localStorage.setItem('saved_tags', JSON.stringify(savedTags)),[savedTags]);
            useEffect(()=>localStorage.setItem('gem_key', key),[key]);
            useEffect(()=>localStorage.setItem('ds_key', dsKey),[dsKey]);

            const handleSmartDelete = (item) => {
                if (item.status === 'stocked') {
                    setConfirmData({
                        isOpen: true,
                        msg: `¿Qué pasó con ${item.name}?`,
                        action: () => { 
                            setItems(prev => prev.map(i => i.id === item.id ? { ...i, status: item.isEssential ? 'needed' : 'inactive' } : i));
                            setConfirmData({ isOpen: false });
                        },
                        actionText: item.isEssential ? "Falta (Esencial)" : "Se acabó (Guardar)",
                        altAction: () => { 
                            setItems(prev => prev.filter(i => i.id !== item.id));
                            setConfirmData({ isOpen: false });
                        },
                        altText: "Borrar Definitivo"
                    });
                } else if (item.status === 'inactive') {
                     setConfirmData({
                        isOpen: true,
                        msg: `¿Borrar definitivamente del historial?`,
                        action: () => { 
                            setItems(prev => prev.filter(i => i.id !== item.id));
                            setConfirmData({ isOpen: false });
                        },
                        actionText: "Sí, borrar",
                        altAction: () => setConfirmData({ isOpen: false }),
                        altText: "Cancelar"
                    });
                } else {
                    setConfirmData({
                        isOpen: true,
                        msg: '¿Eliminar de la lista?',
                        action: () => { setItems(prev => prev.filter(i => i.id !== item.id)); setConfirmData({ isOpen: false }); },
                        actionText: "Eliminar"
                    });
                }
            };

            const requestCheckout = () => {
                const count = items.filter(i => i.status === 'cart').length;
                if (count === 0) return;
                setConfirmData({
                    isOpen: true,
                    msg: `¿Mover ${count} productos a Casa?`,
                    action: () => {
                        const snapshot = items;
                        setItems(prev => prev.map(i => i.status === 'cart' ? { ...i, status: 'stocked', lastBought: todayISO() } : i));
                        setTab('inv');
                        setConfirmData({ isOpen: false });
                        if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
                        setUndoSnapshot({ items: snapshot, label: `${count} productos a Casa` });
                        undoTimerRef.current = setTimeout(() => setUndoSnapshot(null), 5000);
                    },
                    actionText: "Finalizar Compra"
                });
            };

            const handleExportCSV = () => {
                const headers = ["ID,Nombre,Lugares,Categoria,Estado,Esencial,UltimaCompra,Cantidad,Precio,Caducidad"];
                const rows = items.map(i => 
                    `${i.id},"${i.name.replace(/"/g, '""')}","${i.places.join('|')}","${i.category||'Otros'}","${i.status}","${i.isEssential?'Si':'No'}","${i.lastBought||''}","${i.qty||''}","${i.price||''}","${i.expiry||''}"`
                );
                const csvContent = "data:text/csv;charset=utf-8," + [headers, ...rows].join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `misuper_backup_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const parseCSVLine = (line) => {
                const out = []; let cur = ''; let q = false;
                for (let i = 0; i < line.length; i++) {
                    const ch = line[i];
                    if (q) {
                        if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
                        else if (ch === '"') { q = false; }
                        else { cur += ch; }
                    } else {
                        if (ch === ',') { out.push(cur); cur = ''; }
                        else if (ch === '"' && cur === '') { q = true; }
                        else { cur += ch; }
                    }
                }
                out.push(cur);
                return out;
            };

            const handleImportCSV = (e) => {
                const f = e.target.files[0]; if (!f) return;
                const r = new FileReader();
                r.onload = (evt) => {
                    const lines = evt.target.result.split(/\r?\n/);
                    const validStatuses = ['needed', 'cart', 'stocked', 'inactive'];
                    const n = lines.slice(1).map(line => {
                        if (!line.trim()) return null;
                        const c = parseCSVLine(line);
                        if (!c[1]) return null;
                        const status = validStatuses.includes(c[4]) ? c[4] : 'stocked';
                        return {
                            id: newId(),
                            name: c[1] || 'Item',
                            places: c[2] ? c[2].split('|').filter(Boolean) : ['General'],
                            category: c[3] || 'Otros',
                            status,
                            isEssential: c[5] === 'Si',
                            lastBought: c[6] || null,
                            qty: c[7] || '',
                            price: c[8] || '',
                            expiry: c[9] || ''
                        };
                    }).filter(Boolean);
                    if (n.length) {
                        setConfirmData({
                            isOpen: true,
                            msg: `¿Importar ${n.length} productos?`,
                            action: () => { setItems(prev => [...prev, ...n]); setConfirmData({ isOpen: false }); },
                            actionText: "Importar"
                        });
                    }
                };
                r.readAsText(f); e.target.value = '';
            };

            // --- IA LOGIC (DeepSeek + Gemini, structured output) ---
            const callAI = async (textPrompt, imageData = null, wantJson = false) => {
                setLoading(true); setResult(null);

                if (imageData) {
                    if (!key) { setLoading(false); setResult("⚠️ Tickets requieren API Key de Gemini."); return null; }
                    try {
                        const body = { contents: [{ parts: [{ text: textPrompt }, { inline_data: { mime_type: imageData.mime, data: imageData.data } }] }] };
                        if (wantJson) body.generationConfig = { responseMimeType: "application/json" };
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
                        });
                        const data = await res.json();
                        setLoading(false);
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                    } catch (e) { setLoading(false); setResult("Error Gemini."); return null; }
                }

                if (dsKey) {
                    try {
                        const body = {
                            model: "deepseek-chat",
                            messages: [
                                { role: "system", content: "Eres un asistente de inventario experto. Responde SOLO en JSON." },
                                { role: "user", content: textPrompt }
                            ],
                            stream: false
                        };
                        if (wantJson) body.response_format = { type: "json_object" };
                        const res = await fetch("https://api.deepseek.com/chat/completions", {
                            method: "POST",
                            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${dsKey}` },
                            body: JSON.stringify(body)
                        });
                        const data = await res.json();
                        if (data.error) throw new Error(data.error.message);
                        setLoading(false);
                        return data.choices?.[0]?.message?.content || "";
                    } catch (e) {
                        console.error(e);
                        if (!key) { setLoading(false); setResult(`Error DeepSeek: ${e.message}`); return null; }
                    }
                }

                if (key) {
                    try {
                        const body = { contents: [{ parts: [{ text: textPrompt }] }] };
                        if (wantJson) body.generationConfig = { responseMimeType: "application/json" };
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
                        });
                        const data = await res.json();
                        setLoading(false);
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                    } catch (e) { setLoading(false); setResult("Error Gemini."); return null; }
                }

                setLoading(false);
                setResult("⚠️ Configura una API Key (Gemini o DeepSeek).");
                return null;
            };

            const cleanJSON = (text) => {
                if (!text) return text;
                const arr = text.indexOf('['); const obj = text.indexOf('{');
                let s = -1, e = -1;
                if (arr !== -1 && (obj === -1 || arr < obj)) { s = arr; e = text.lastIndexOf(']'); }
                else if (obj !== -1) { s = obj; e = text.lastIndexOf('}'); }
                return (s !== -1 && e !== -1) ? text.substring(s, e + 1) : text;
            };

            const handleDictation = async () => {
                if (!prompt.trim()) return;
                const p = `Analiza: "${prompt}". Devuelve JSON con esta forma exacta: {"items":[{"name":"x","places":["y"],"status":"needed|stocked","qty":"1","expiry":"YYYY-MM-DD","category":"Alimentos|Medicamentos|Limpieza|Hogar|Mascotas|Otros"}]}. Si dice "tengo" usa "stocked". Si no hay categoria, adivina. SOLO JSON, sin markdown.`;
                const raw = await callAI(p, null, true);
                if (raw) {
                    try {
                        const parsed = JSON.parse(cleanJSON(raw));
                        const arr = Array.isArray(parsed) ? parsed : (parsed.items || []);
                        const newItems = arr.map(i => ({
                            id: newId(), name: i.name, places: i.places || ['General'],
                            status: i.status || 'needed', lastBought: i.status === 'stocked' ? todayISO() : null,
                            qty: i.qty || '', price: '', expiry: i.expiry || '', category: i.category || 'Otros', isEssential: false
                        }));
                        setItems(prev => [...prev, ...newItems]);
                        setResult(`✅ ${newItems.length} items agregados.`); setPrompt('');
                    } catch (e) { setResult("La IA no devolvio un formato valido. Intenta de nuevo."); }
                }
            };

            const handleTicketUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setModal('ticket'); setLoading(true);
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onloadend = async () => {
                    const base64Data = reader.result.split(',')[1];
                    const mimeType = file.type;
                    const promptText = `Analiza ticket de compra. Extrae productos y precios. Devuelve JSON con esta forma exacta: {"items":[{"name":"Prod","price":10.50,"qty":"1"}]}. SOLO JSON.`;
                    const text = await callAI(promptText, { mime: mimeType, data: base64Data }, true);
                    if (text) {
                        try {
                            const parsed = JSON.parse(cleanJSON(text));
                            const ticketItems = Array.isArray(parsed) ? parsed : (parsed.items || []);
                            if (ticketItems.length === 0) { setResult("Ticket procesado pero no se detectaron productos."); return; }
                            let added = 0, updated = 0;
                            setItems(prev => {
                                const list = [...prev];
                                ticketItems.forEach(t => {
                                    const idx = list.findIndex(i => i.name.toLowerCase().includes(t.name.toLowerCase()));
                                    if (idx >= 0) {
                                        list[idx] = { ...list[idx], price: t.price, lastBought: todayISO(), status: 'stocked' };
                                        updated++;
                                    } else {
                                        list.push({ id: newId(), name: t.name, places: ['Ticket'], status: 'stocked', lastBought: todayISO(), qty: t.qty || '1', price: t.price, expiry: '', category: 'Otros', isEssential: false });
                                        added++;
                                    }
                                });
                                return list;
                            });
                            setResult(`🧾 Ticket: ${added} nuevos, ${updated} actualizados.`);
                        } catch (err) { setResult("Error procesando datos del ticket."); }
                    }
                };
            };

            const handleChef = async () => {
                const stock = items.filter(i=>i.status==='stocked').map(i=>`${i.name} (${i.qty||''})`).join(', ');
                if(!stock) { setResult("Alacena vacía."); return; }
                const raw = await callAI(`Soy chef. Tengo: ${stock}. Crea receta corta. Título divertido.`);
                setResult(raw);
            };

            const addItem = (e) => {
                if (e) e.preventDefault(); if (!name.trim()) return;
                const existing = items.find(i => i.name.toLowerCase() === name.toLowerCase() && i.status === 'inactive');
                if (existing) {
                    setItems(items.map(i => i.id === existing.id ? { ...i, status: tab === 'inv' ? 'stocked' : 'needed' } : i));
                } else {
                    setItems([...items, { id: newId(), name, places: selTags, status: tab === 'inv' ? 'stocked' : 'needed', lastBought: tab === 'inv' ? todayISO() : null, qty: '', price: '', expiry: '', category: 'Otros', isEssential: false }]);
                }
                setName(''); setSelTags(['General']);
            };
            
            const toggleTag = (t) => { if(selTags.includes(t)) { if(selTags.length>1) setSelTags(selTags.filter(x=>x!==t)); } else setSelTags([...selTags, t]); };
            const addTag = () => { if(tagInput && !savedTags.includes(tagInput)){ setSavedTags([...savedTags, tagInput]); setSelTags([...selTags, tagInput]); setTagInput(''); } };
            const openEdit = (item) => { setEditItem({...item}); setModal('edit'); };
            const saveEdit = () => { setItems(items.map(i => i.id === editItem.id ? editItem : i)); setModal(null); setEditItem(null); };

            const displayItems = () => {
                if(tab==='shop') return items.filter(i => (i.status==='needed'||i.status==='cart') && (filter==='Todos'||i.places.includes(filter)||i.places.includes('General')));
                if(tab==='inv') {
                    let base = items.filter(i => i.status==='stocked');
                    if(invFilter === 'Agotados') base = items.filter(i => i.status==='inactive'); 
                    else if(invFilter !== 'Todos') base = base.filter(i => i.category === invFilter);
                    return base;
                }
                if(tab==='hist') return items.filter(i => i.lastBought);
                return [];
            };
            const list = displayItems();

            // --- AUDIO RECORDING (Browser API) ---
            const startListening = () => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) { alert("Navegador no soporta dictado."); return; }
                const rec = new SR();
                rec.lang = 'es-MX'; rec.continuous = true; rec.interimResults = true;
                rec.onstart = () => setIsListening(true);
                rec.onend = () => setIsListening(false);
                rec.onerror = (e) => { setIsListening(false); if(e.error!=='no-speech') alert("Error: "+e.error); };
                rec.onresult = (e) => {
                    let final = '';
                    for (let i = e.resultIndex; i < e.results.length; ++i) if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
                    if (final) setPrompt(p => (p + ' ' + final).trim());
                };
                recognitionRef.current = rec;
                rec.start();
            };
            const toggleListening = () => { if(isListening && recognitionRef.current) { recognitionRef.current.stop(); setIsListening(false); } else startListening(); };

            return (
                <div className="w-full h-full sm:h-[90vh] sm:max-w-[420px] bg-white sm:rounded-[30px] shadow-2xl flex flex-col relative overflow-hidden text-gray-800">
                    <div className="bg-indigo-600 px-5 pb-4 ios-header text-white rounded-b-[24px] shadow-lg shrink-0 z-10">
                        <div className="flex justify-between items-center mb-4 mt-2">
                            <h1 className="text-xl font-bold flex items-center gap-2"><Icon name="ShoppingBag"/> Mi Súper</h1>
                            <div className="flex gap-2">
                                <label className="p-2 bg-white/20 rounded-full hover:bg-white/30 cursor-pointer"><Icon name="Camera"/><input type="file" accept="image/*" className="hidden" onChange={handleTicketUpload}/></label>
                                <button onClick={()=>{setModal('dictate'); setResult(null)}} className="p-2 bg-white/20 rounded-full"><Icon name="Mic"/></button>
                                <button onClick={()=>{setModal('chef'); setResult(null); handleChef();}} className="p-2 bg-white/20 rounded-full"><Icon name="Chef"/></button>
                                <button onClick={()=>setModal('settings')} className="p-2 bg-white/20 rounded-full"><Icon name="Settings"/></button>
                            </div>
                        </div>
                        <div className="bg-white/10 backdrop-blur p-2 rounded-xl border border-white/20">
                            <div className="flex gap-2 mb-2">
                                <input value={name} onChange={e=>setName(e.target.value)} placeholder={tab==='inv'?"Agregar a Casa...":"¿Qué falta?"} className="bg-transparent w-full text-white placeholder-indigo-200 outline-none font-medium"/>
                                <button onClick={addItem} disabled={!name} className="bg-white text-indigo-600 p-2 rounded-lg"><Icon name="Plus"/></button>
                            </div>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                <div className="flex items-center gap-1 bg-white/20 px-2 py-1 rounded-lg shrink-0"><Icon name="Plus" size={10}/><input value={tagInput} onChange={e=>setTagInput(e.target.value)} onBlur={addTag} onKeyDown={e=>e.key==='Enter'&&addTag()} placeholder="Etiqueta" className="bg-transparent w-14 text-xs text-white outline-none placeholder-indigo-300"/></div>
                                {savedTags.map(t=>(<button key={t} onClick={()=>toggleTag(t)} className={`px-2 py-1 rounded-lg text-[10px] font-bold whitespace-nowrap transition ${selTags.includes(t)?'bg-white text-indigo-700':'bg-indigo-800/50 text-indigo-200 border border-indigo-500/30'}`}>{t} {selTags.includes(t)&&'✓'}</button>))}
                            </div>
                        </div>
                    </div>

                    <div className="flex border-b border-gray-100 shrink-0">
                        {[{id:'shop',icon:'ShoppingBag',l:'Lista'},{id:'inv',icon:'Home',l:'Casa'},{id:'hist',icon:'History',l:'Historial'}].map(x=>(<button key={x.id} onClick={()=>setTab(x.id)} className={`flex-1 py-3 flex flex-col items-center gap-1 text-[10px] font-bold ${tab===x.id?'text-indigo-600 bg-indigo-50':'text-gray-400'}`}><Icon name={x.icon} size={20} className={tab===x.id?'stroke-[2.5]':'stroke-2'}/> {x.l}</button>))}
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50 pb-safe-bottom safe-bottom">
                        {tab==='shop' && (
                            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                <button onClick={()=>setFilter('Todos')} className={`px-3 py-1 rounded-full text-xs font-bold border ${filter==='Todos'?'bg-gray-800 text-white':'bg-white text-gray-500'}`}>Todos</button>
                                {savedTags.filter(x=>x!=='General').map(t=>(<button key={t} onClick={()=>setFilter(t)} className={`px-3 py-1 rounded-full text-xs font-bold border whitespace-nowrap ${filter===t?'bg-gray-800 text-white':'bg-white text-gray-500'}`}>{t}</button>))}
                            </div>
                        )}
                        {tab==='inv' && (
                            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1 mb-2">
                                <button onClick={()=>setInvFilter('Todos')} className={`px-3 py-1 rounded-full text-xs font-bold border ${invFilter==='Todos'?'bg-green-600 text-white':'bg-white text-gray-500'}`}>Todos</button>
                                {categories.map(c=>(<button key={c} onClick={()=>setInvFilter(c)} className={`px-3 py-1 rounded-full text-xs font-bold border whitespace-nowrap ${invFilter===c?'bg-green-600 text-white':'bg-white text-gray-500'}`}>{c}</button>))}
                                <button onClick={()=>setInvFilter('Agotados')} className={`px-3 py-1 rounded-full text-xs font-bold border bg-gray-200 text-gray-600 ${invFilter==='Agotados'?'border-gray-400 bg-gray-300':''}`}>Agotados</button>
                            </div>
                        )}
                        {(tab==='inv' || tab==='hist') && (
                            <div className="flex justify-end mb-2">
                                <button onClick={handleExportCSV} className="bg-white border text-indigo-600 px-3 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1"><Icon name="Download" size={12}/> Exportar CSV</button>
                                {tab==='inv' && <div className="ml-2 relative overflow-hidden"><button className="bg-white border text-gray-600 px-3 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1"><Icon name="Upload" size={12}/> Importar</button><input type="file" accept=".csv" onChange={handleImportCSV} className="absolute inset-0 opacity-0"/></div>}
                            </div>
                        )}

                        {!list.length && <div className="text-center py-10 text-gray-400 text-sm">Nada por aquí 🦗</div>}
                        
                        {list.map(i => (
                            <div key={i.id} className={`p-3 rounded-xl border flex flex-col gap-2 shadow-sm transition animate-enter bg-white ${i.status==='cart'?'bg-green-50 border-green-200 opacity-60':''} ${i.status==='inactive'?'opacity-70 bg-gray-50':''}`}>
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-3 overflow-hidden flex-1 cursor-pointer" onClick={()=>{
                                        if(tab==='shop') setItems(items.map(x=>x.id===i.id?{...x,status:i.status==='needed'?'cart':'needed'}:x));
                                        if(i.status==='inactive') setItems(items.map(x=>x.id===i.id?{...x,status:'stocked'}:x)); // Reactivar
                                    }}>
                                        <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0 ${i.status==='cart'?'bg-green-500 border-green-500':'border-gray-300'}`}>{i.status==='cart'&&<Icon name="Check" size={12} className="text-white"/>}</div>
                                        <div className="min-w-0">
                                            <p className={`font-semibold text-sm ${i.status==='cart'&&'line-through'} flex items-center gap-1`}>
                                                {i.name}
                                                {i.isEssential && <Icon name="Star" size={12} className="text-yellow-400 fill-current"/>}
                                            </p>
                                            <p className="text-[10px] text-gray-500">{i.category} • {i.places.join(', ')}</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        {/* BOTÓN MÁGICO PARA PASAR A LISTA */}
                                        {(tab==='inv' && i.status!=='inactive') && (
                                            <button onClick={()=>setItems(items.map(x=>x.id===i.id?{...x,status:'needed'}:x))} className="p-1.5 bg-indigo-50 text-indigo-600 rounded-lg"><Icon name="Plus" size={16}/></button>
                                        )}
                                        <button onClick={()=>openEdit(i)} className="text-gray-300 hover:text-indigo-500"><Icon name="Edit" size={16}/></button>
                                        <button onClick={()=>handleSmartDelete(i)} className="text-gray-300 hover:text-red-500"><Icon name="Trash" size={16}/></button>
                                    </div>
                                </div>
                                {(i.qty || i.price || i.expiry) && (
                                    <div className="flex gap-3 text-[10px] text-gray-500 border-t pt-1 mt-1">
                                        {i.qty && <span className="bg-gray-100 px-1 rounded">{i.qty}</span>}
                                        {i.price && <span className="bg-green-50 text-green-700 px-1 rounded">${i.price}</span>}
                                        {i.expiry && <span className="flex items-center gap-1 bg-red-50 text-red-600 px-1 rounded"><Icon name="Clock" size={10}/> {i.expiry}</span>}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    {tab==='shop' && items.some(i=>i.status==='cart') && (
                        <div className="absolute bottom-4 left-4 right-4 animate-enter pb-safe-bottom">
                            <button onClick={requestCheckout} className="w-full bg-gray-900 text-white p-4 rounded-xl shadow-xl flex justify-between items-center"><span className="font-bold text-sm ml-2">Finalizar Compra ({items.filter(i=>i.status==='cart').length})</span><div className="bg-white/20 p-1 rounded-full mr-2"><Icon name="ArrowRight"/></div></button>
                        </div>
                    )}

                    {undoSnapshot && (
                        <div className="absolute bottom-4 left-4 right-4 toast-enter pb-safe-bottom z-30">
                            <div className="bg-gray-900 text-white p-3 rounded-xl shadow-xl flex justify-between items-center">
                                <span className="text-sm">✓ {undoSnapshot.label}</span>
                                <button onClick={() => { setItems(undoSnapshot.items); setUndoSnapshot(null); if (undoTimerRef.current) clearTimeout(undoTimerRef.current); }} className="bg-white/20 px-3 py-1 rounded-lg text-xs font-bold">Deshacer</button>
                            </div>
                        </div>
                    )}

                    {confirmData.isOpen && (
                        <div className="absolute inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-6 animate-enter">
                            <div className="bg-white w-full max-w-sm rounded-2xl p-6 text-center shadow-2xl">
                                <h3 className="font-bold text-lg mb-2 text-gray-800">{confirmData.msg}</h3>
                                <div className="flex flex-col gap-2 mt-4">
                                    <button onClick={confirmData.action} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg">{confirmData.actionText}</button>
                                    {confirmData.altAction && <button onClick={confirmData.altAction} className="w-full py-3 bg-red-100 text-red-600 rounded-xl font-bold">{confirmData.altText}</button>}
                                    <button onClick={()=>setConfirmData({isOpen:false})} className="w-full py-2 text-gray-400 text-sm font-bold">Cancelar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {modal && !confirmData.isOpen && (
                        <div className="absolute inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-4">
                            <div className="bg-white w-full rounded-2xl p-5 shadow-2xl animate-enter max-h-[85%] overflow-auto">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-lg flex gap-2 items-center">
                                        {modal==='settings' && <><Icon name="Settings"/> Ajustes</>}
                                        {modal==='edit' && <><Icon name="Edit"/> Editar</>}
                                        {modal==='dictate' && <><Icon name="Mic"/> Dictado AI</>}
                                        {modal==='chef' && <><Icon name="Chef"/> Chef AI</>}
                                        {modal==='ticket' && <><Icon name="Camera"/> Ticket AI</>}
                                    </h3>
                                    <button onClick={()=>{setModal(null); setEditItem(null); setResult(null)}} className="bg-gray-100 p-1 rounded-full"><Icon name="X"/></button>
                                </div>

                                {modal === 'edit' && editItem && (
                                    <div className="space-y-3">
                                        <input value={editItem.name} onChange={e=>setEditItem({...editItem, name:e.target.value})} className="w-full border p-2 rounded-lg font-bold" placeholder="Nombre"/>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div><label className="text-[10px] font-bold text-gray-500">Cantidad</label><input value={editItem.qty} onChange={e=>setEditItem({...editItem, qty:e.target.value})} className="w-full border p-2 rounded-lg"/></div>
                                            <div><label className="text-[10px] font-bold text-gray-500">Precio</label><input type="number" value={editItem.price} onChange={e=>setEditItem({...editItem, price:e.target.value})} className="w-full border p-2 rounded-lg"/></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>
                                                <label className="text-[10px] font-bold text-gray-500">Categoría</label>
                                                <select value={editItem.category} onChange={e=>setEditItem({...editItem, category:e.target.value})} className="w-full border p-2 rounded-lg bg-white">{categories.map(c=><option key={c} value={c}>{c}</option>)}</select>
                                            </div>
                                            <div><label className="text-[10px] font-bold text-gray-500">Caducidad</label><input type="date" value={editItem.expiry} onChange={e=>setEditItem({...editItem, expiry:e.target.value})} className="w-full border p-2 rounded-lg"/></div>
                                        </div>
                                        <div><label className="text-[10px] font-bold text-gray-500">Lugares (separados por coma)</label><input value={editItem.places.join(', ')} onChange={e=>setEditItem({...editItem, places:e.target.value.split(',').map(s=>s.trim())})} className="w-full border p-2 rounded-lg"/></div>
                                        <div className="flex items-center gap-2 border p-3 rounded-lg bg-yellow-50 border-yellow-100" onClick={()=>setEditItem({...editItem, isEssential: !editItem.isEssential})}>
                                            <div className={`w-5 h-5 rounded border flex items-center justify-center ${editItem.isEssential?'bg-yellow-400 border-yellow-400':'bg-white border-gray-300'}`}>{editItem.isEssential && <Icon name="Check" size={12} className="text-white"/>}</div>
                                            <span className="text-sm font-bold text-yellow-800 flex items-center gap-1">Marcar Esencial <Icon name="Star" size={14}/></span>
                                        </div>
                                        <button onClick={saveEdit} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mt-2">Guardar Cambios</button>
                                    </div>
                                )}

                                {modal === 'settings' && (
                                    <div className="space-y-4">
                                        <p className="text-xs text-gray-500">Google Gemini API Key (Recomendado para todo):</p>
                                        <input value={key} onChange={e=>setKey(e.target.value)} className="w-full border p-2 rounded font-mono text-xs" placeholder="AIza..."/>
                                        <p className="text-xs text-gray-500">DeepSeek API Key (Opcional, solo texto):</p>
                                        <input value={dsKey} onChange={e=>setDsKey(e.target.value)} className="w-full border p-2 rounded font-mono text-xs" placeholder="sk-..."/>
                                        <button onClick={()=>setModal(null)} className="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold">Guardar</button>
                                    </div>
                                )}

                                {(modal === 'dictate' || modal === 'chef' || modal === 'ticket') && (
                                    <div className="space-y-3">
                                        {modal === 'dictate' && (
                                            <>
                                                <p className="text-xs text-gray-500">Dicta: "Compré leche, falta huevo..."</p>
                                                <textarea value={prompt} onChange={e=>setPrompt(e.target.value)} className="w-full border p-2 rounded-lg text-sm" rows="3"/>
                                                <div className="flex gap-2">
                                                    <button onClick={toggleListening} className={`flex-1 py-3 rounded-lg font-bold text-white flex justify-center items-center gap-2 ${isListening ? 'mic-active' : 'bg-red-500'}`}>{isListening ? <><Icon name="Stop"/> Parar</> : <><Icon name="Mic"/> Hablar</>}</button>
                                                    <button onClick={handleDictation} disabled={loading} className="flex-1 bg-indigo-600 text-white py-3 rounded-lg font-bold flex justify-center items-center gap-2">{loading ? 'Pensando...' : 'Procesar'}</button>
                                                </div>
                                            </>
                                        )}
                                        {(loading || result) && (
                                            <div className="bg-indigo-50 p-3 rounded-xl border border-indigo-100 text-sm mt-2 text-center">
                                                {loading ? <p className="text-indigo-600 animate-pulse">Pensando...</p> : <><div className="prose prose-sm text-left whitespace-pre-wrap">{result}</div><button onClick={()=>{setResult(null); setPrompt('')}} className="mt-2 w-full bg-white py-1 rounded text-xs font-bold border">Limpiar</button></>}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SuperApp />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
